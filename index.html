function renderAnkiBuilder() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const wrap = document.createElement('div');

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'card';
  hdr.innerHTML = `<div class="sec-title"><span class="sec-num">🃏</span>Anki Card Builder</div><div class="divider"></div>
    <p class="body-text">Select any saved illness script → generate 15 PANCE-focused cloze deletion cards → copy directly into Anki. One click from script to cards.</p>`;
  wrap.appendChild(hdr);

  if (scripts.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'card';
    empty.innerHTML = `<div style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:10px">🃏</div>
      <div style="font-weight:700;color:var(--navy);margin-bottom:8px">No scripts saved yet</div>
      <p style="color:var(--gray);font-size:13px">Build at least one illness script first, then come back to generate cards.</p>
      <button class="btn btn-gold" style="margin-top:12px" onclick="navigate('script-builder')">✎ Build a Script →</button>
    </div>`;
    wrap.appendChild(empty);
    main.appendChild(wrap);
    return;
  }

  let selectedScript = null;
  let generatedCards = [];
  let cardCount = 15;

  // ── SCRIPT SELECTOR ──
  const selCard = document.createElement('div');
  selCard.className = 'card';

  const selTitle = document.createElement('div');
  selTitle.className = 'h2';
  selTitle.textContent = 'Select a Script';
  selCard.appendChild(selTitle);

  // Block filter
  const filterRow = document.createElement('div');
  filterRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center';
  const blocks = ['All', ...new Set(scripts.map(s => s.block).filter(Boolean))];
  let activeBlock = 'All';
  blocks.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline btn-xs';
    btn.style.cssText = b === activeBlock ? 'background:var(--navy);color:#fff;border-color:var(--navy)' : '';
    btn.textContent = b;
    btn.onclick = () => {
      activeBlock = b;
      filterRow.querySelectorAll('button').forEach((bb, i) => {
        bb.style.cssText = blocks[i] === activeBlock ? 'background:var(--navy);color:#fff;border-color:var(--navy)' : '';
      });
      renderScriptList();
    };
    filterRow.appendChild(btn);
  });
  selCard.appendChild(filterRow);

  // Script list
  const scriptList = document.createElement('div');
  scriptList.style.cssText = 'display:grid;gap:8px';

  function renderScriptList() {
    scriptList.innerHTML = '';
    const filtered = activeBlock === 'All' ? scripts : scripts.filter(s => s.block === activeBlock);
    if (filtered.length === 0) {
      scriptList.innerHTML = '<div style="color:var(--gray);font-size:13px;padding:8px 0">No scripts in this block.</div>';
      return;
    }
    filtered.forEach(s => {
      const row = document.createElement('div');
      const isSelected = selectedScript && selectedScript.id === s.id;
      row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:9px;cursor:pointer;border:1.5px solid ${isSelected ? 'var(--blue)' : 'var(--border)'};background:${isSelected ? 'var(--blue-lt)' : '#fff'};transition:all .15s`;
      row.innerHTML = `<div>
        <div style="font-weight:700;color:var(--navy);font-size:13.5px">${escHtml(s.disease)}</div>
        <div style="font-size:11px;color:var(--gray)">${escHtml(s.block || 'No block')} ${s.who ? '· ' + escHtml(s.who.slice(0,50)) + (s.who.length>50?'...':'') : ''}</div>
      </div>
      ${isSelected ? '<span style="color:var(--blue);font-weight:700;font-size:12px">✓ Selected</span>' : '<span style="color:var(--gray);font-size:12px">Select →</span>'}`;
      row.onclick = () => {
        selectedScript = s;
        renderScriptList();
        generateSection.style.display = 'block';
        selectedNameSpan.textContent = s.disease;
        cardsArea.style.display = 'none';
        generatedCards = [];
      };
      scriptList.appendChild(row);
    });
  }

  renderScriptList();
  selCard.appendChild(scriptList);
  wrap.appendChild(selCard);

  // ── GENERATE SECTION ──
  const generateSection = document.createElement('div');
  generateSection.className = 'card';
  generateSection.style.display = 'none';

  const genTitle = document.createElement('div');
  genTitle.className = 'h2';
  genTitle.innerHTML = 'Generate Cards for: <span id="selected-name-span" style="color:var(--blue)"></span>';
  generateSection.appendChild(genTitle);

  // Options row
  const optRow = document.createElement('div');
  optRow.style.cssText = 'display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px';
  const countLabel = document.createElement('span');
  countLabel.style.cssText = 'font-size:13px;font-weight:700;color:var(--navy)';
  countLabel.textContent = 'Cards to generate:';
  const countSel = document.createElement('select');
  countSel.className = 'sf-input';
  countSel.style.cssText = 'height:34px;width:80px';
  [10, 15, 20].forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if (n === 15) o.selected = true;
    countSel.appendChild(o);
  });
  countSel.onchange = () => { cardCount = parseInt(countSel.value); };
  optRow.appendChild(countLabel);
  optRow.appendChild(countSel);
  generateSection.appendChild(optRow);

  const genBtn = document.createElement('button');
  genBtn.className = 'btn btn-gold';
  genBtn.style.cssText = 'width:100%;font-size:15px;padding:12px';
  genBtn.textContent = '✨ Generate Anki Cards';
  generateSection.appendChild(genBtn);

  wrap.appendChild(generateSection);

  // ── CARDS AREA ──
  const cardsArea = document.createElement('div');
  cardsArea.style.display = 'none';
  wrap.appendChild(cardsArea);

  const selectedNameSpan = document.getElementById ? null : null; // set after append

  genBtn.onclick = async () => {
    if (!selectedScript) return;
    genBtn.disabled = true;
    genBtn.textContent = '⏳ Generating cards...';
    cardsArea.style.display = 'none';
    cardsArea.innerHTML = '';

    const loadCard = document.createElement('div');
    loadCard.className = 'card';
    loadCard.style.textAlign = 'center';
    loadCard.innerHTML = `<div style="font-size:28px;margin-bottom:12px">⏳</div>
      <div style="font-weight:700;color:var(--navy);margin-bottom:6px">Building ${cardCount} cards...</div>
      <div style="font-size:12.5px;color:var(--gray)">Prioritizing PANCE-high-yield content from your script</div>`;
    cardsArea.style.display = 'block';
    cardsArea.appendChild(loadCard);

    const s = selectedScript;
    const diffs = (s.differentials||[]).filter(d=>d.disease).map(d=>`vs ${d.disease}${d.feature?' — '+d.feature:''}`).join('; ');

    const prompt = `You are an Anki card generator for a PA student preparing for the PANCE.

Generate exactly ${cardCount} Anki cloze deletion cards from this illness script. 

RULES:
- Use {{c1::answer}} format for cloze deletions
- One distinct clinical concept per card — no duplicates
- Each card = one front sentence with one or more cloze deletions
- Prioritize: (1) classic presentation/buzzword, (2) gold standard diagnosis, (3) first-line treatment, (4) key contraindications, (5) distinguishing DDx features, (6) red flags/must-not-miss
- Mark the 3 highest-yield cards with [★] at the start
- Keep cards concise — one fact per card
- Format: number each card, one per line, no extra text between cards

ILLNESS SCRIPT:
Disease: ${s.disease}
Block: ${s.block||''}
Who gets it: ${s.who||''}
Pathophysiology: ${s.pathophysiology||''}
Presentation: ${s.presents||''}
Pertinent negatives: ${s.pertinentNegatives||''}
Key diagnostics: ${s.keyDiagnostics||''}
Gold standard: ${s.confirms||''}
Treatment: ${s.treats||''}
Red flags: ${s.complications||''}
Differentials: ${diffs||'none listed'}

Output ONLY the numbered cards. No intro text, no section headers, no explanation after the cards.`;

    try {
      if (needsApiKey()) { genBtn.disabled=false; genBtn.textContent='✨ Generate Anki Cards'; cardsArea.style.display='none'; return; }
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: getAnthropicHeaders(),
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'API error: ' + response.status);
      const text = data.content?.[0]?.text || '';
      // Parse numbered cards
      const lines = text.split('\n').map(l => l.trim()).filter(l => /^\d+\./.test(l) || l.startsWith('[★]'));
      generatedCards = lines.map(l => {
        const isHighYield = l.includes('[★]');
        const clean = l.replace(/^\d+\.\s*/, '').replace('[★]', '').trim();
        return { text: clean, highYield: isHighYield };
      }).filter(c => c.text.length > 5);

      // Render cards
      cardsArea.innerHTML = '';

      // Top action bar
      const actionBar = document.createElement('div');
      actionBar.className = 'card';
      actionBar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px';

      const statsDiv = document.createElement('div');
      statsDiv.innerHTML = `<span style="font-weight:700;color:var(--navy);font-size:14px">${generatedCards.length} cards generated</span>
        <span style="font-size:12px;color:var(--gray);margin-left:8px">for ${escHtml(s.disease)}</span>
        <span style="font-size:12px;color:var(--gold);font-weight:700;margin-left:8px">${generatedCards.filter(c=>c.highYield).length} ★ high-yield</span>`;

      const btnGroup = document.createElement('div');
      btnGroup.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap';

      const copyAllBtn = document.createElement('button');
      copyAllBtn.className = 'btn btn-gold btn-sm';
      copyAllBtn.textContent = '📋 Copy All for Anki';
      copyAllBtn.onclick = () => {
        const text = generatedCards.map(c => c.text).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          copyAllBtn.textContent = '✓ Copied!';
          setTimeout(() => copyAllBtn.textContent = '📋 Copy All for Anki', 2500);
        });
      };

      const regenBtn = document.createElement('button');
      regenBtn.className = 'btn btn-outline btn-sm';
      regenBtn.textContent = '↺ Regenerate';
      regenBtn.onclick = () => genBtn.click();

      btnGroup.appendChild(copyAllBtn);
      btnGroup.appendChild(regenBtn);
      actionBar.appendChild(statsDiv);
      actionBar.appendChild(btnGroup);
      cardsArea.appendChild(actionBar);

      // Import instructions
      const instrCard = document.createElement('div');
      instrCard.className = 'card';
      instrCard.style.cssText = 'background:var(--blue-lt);border:1.5px solid #B5D4F4';
      instrCard.innerHTML = `<div style="font-weight:700;color:var(--navy);font-size:12.5px;margin-bottom:6px">How to import into Anki</div>
        <ol style="font-size:12px;line-height:1.9;color:var(--navy2);margin:0;padding-left:16px">
          <li>Click <strong>Copy All for Anki</strong> above</li>
          <li>Open Anki → <strong>File → Import</strong> (or press Ctrl/Cmd+I)</li>
          <li>Paste into a text file saved as <strong>.txt</strong> first, then import that file</li>
          <li>Select note type: <strong>Cloze</strong> | Deck: your block deck</li>
          <li>Field separator: <strong>Tab</strong> | Check "Allow HTML in fields"</li>
        </ol>`;
      cardsArea.appendChild(instrCard);

      // Cards list
      const cardsListCard = document.createElement('div');
      cardsListCard.className = 'card';
      cardsListCard.style.padding = '16px';

      const listHeader = document.createElement('div');
      listHeader.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
      listHeader.innerHTML = `<div class="h2" style="margin:0">Cards</div>
        <span style="font-size:11px;color:var(--gray)">★ = highest yield · Click card to copy individually</span>`;
      cardsListCard.appendChild(listHeader);

      generatedCards.forEach((card, i) => {
        const cardEl = document.createElement('div');
        cardEl.style.cssText = `display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:1.5px solid ${card.highYield ? 'var(--gold)' : 'var(--border)'};background:${card.highYield ? 'var(--gold-lt)' : '#fff'};transition:all .15s`;
        cardEl.title = 'Click to copy this card';

        // Render cloze deletions as highlighted
        const rendered = escHtml(card.text).replace(/\{\{c\d+::(.*?)\}\}/g, '<mark style="background:#FEF3C7;padding:1px 4px;border-radius:3px;font-weight:700">$1</mark>');

        cardEl.innerHTML = `
          <span style="font-size:11px;font-weight:700;color:${card.highYield ? 'var(--gold)' : 'var(--gray)'};min-width:28px;padding-top:2px">${card.highYield ? '★' : (i+1)+'.'}</span>
          <div style="flex:1;font-size:13px;line-height:1.7;color:var(--navy2)">${rendered}</div>
          <span style="font-size:11px;color:var(--gray);flex-shrink:0;padding-top:2px">copy</span>`;

        cardEl.onclick = () => {
          navigator.clipboard.writeText(card.text).then(() => {
            cardEl.style.background = 'var(--green-lt)';
            cardEl.style.borderColor = 'var(--green)';
            setTimeout(() => {
              cardEl.style.background = card.highYield ? 'var(--gold-lt)' : '#fff';
              cardEl.style.borderColor = card.highYield ? 'var(--gold)' : 'var(--border)';
            }, 1500);
          });
        };
        cardsListCard.appendChild(cardEl);
      });

      cardsArea.appendChild(cardsListCard);
      genBtn.disabled = false;
      genBtn.textContent = '✨ Generate Anki Cards';

    } catch(e) {
      cardsArea.innerHTML = '';
      const errCard = document.createElement('div');
      errCard.className = 'card';
      errCard.innerHTML = `<div class="callout red"><div class="ct">Generation failed</div><div class="cb">${escHtml(e.message||String(e))}</div></div>`;
      cardsArea.appendChild(errCard);
      genBtn.disabled = false;
      genBtn.textContent = '✨ Generate Anki Cards';
    }
  };

  // Wire up selectedNameSpan after DOM insertion
  generateSection.querySelector('#selected-name-span') && (generateSection.querySelector('#selected-name-span').id = 'selected-name-span-' + Date.now());
  const selectedNameSpanEl = generateSection.querySelector('[id^="selected-name-span"]');

  // Re-wire renderScriptList to update the span
  const origRender = renderScriptList;

  main.appendChild(wrap);
}


// ══════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════

function renderSettings() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const wrap = document.createElement('div');

  const hdr = document.createElement('div');
  hdr.className = 'card';
  hdr.innerHTML = `<div class="sec-title"><span class="sec-num">⚙️</span>Settings</div><div class="divider"></div>`;
  wrap.appendChild(hdr);

  // ── API KEY SECTION ──
  const apiCard = document.createElement('div');
  apiCard.className = 'card';

  apiCard.innerHTML = `
    <div class="h2">Anthropic API Key</div>
    <p class="body-text">Required for the Vignette Quiz and Anki Card Builder. Your key is stored locally on this device only — never sent anywhere except directly to Anthropic's API.</p>
  `;

  // How to get key
  apiCard.insertAdjacentHTML('beforeend', `
    <div style="background:var(--blue-lt);border:1.5px solid #B5D4F4;border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-weight:700;color:var(--navy);font-size:13px;margin-bottom:6px">How to get your API key (free)</div>
      <ol style="font-size:12.5px;line-height:2;color:#374151;padding-left:18px;margin:0">
        <li>Go to <strong>console.anthropic.com</strong></li>
        <li>Sign up or log in</li>
        <li>Click <strong>API Keys</strong> in the left sidebar</li>
        <li>Click <strong>Create Key</strong> → name it <code style="background:#E8EEF4;padding:1px 5px;border-radius:3px">chapa-app</code></li>
        <li>Copy the key (starts with <code style="background:#E8EEF4;padding:1px 5px;border-radius:3px">sk-ant-</code>)</li>
        <li>Paste it below</li>
      </ol>
      <div style="margin-top:8px;font-size:11.5px;color:#374151"><strong>Cost:</strong> Extremely cheap — generating a vignette or 15 Anki cards costs less than $0.01. New accounts get free credits.</div>
    </div>
  `);

  // Status indicator
  const statusDiv = document.createElement('div');
  statusDiv.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px';
  const dot = document.createElement('span');
  dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${anthropicKey ? '#4CAF50' : '#E53935'};flex-shrink:0`;
  const statusTxt = document.createElement('span');
  statusTxt.style.cssText = 'font-size:13px;font-weight:600;color:var(--navy)';
  statusTxt.textContent = anthropicKey ? '✓ API key saved' : 'No API key set';
  statusDiv.appendChild(dot);
  statusDiv.appendChild(statusTxt);
  apiCard.appendChild(statusDiv);

  // Input row
  const inputRow = document.createElement('div');
  inputRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:10px';
  const keyInput = document.createElement('input');
  keyInput.className = 'sf-input';
  keyInput.type = 'password';
  keyInput.style.cssText = 'flex:1;height:40px;font-family:monospace;font-size:13px';
  keyInput.placeholder = 'sk-ant-api03-...';
  keyInput.value = anthropicKey;

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-gold';
  saveBtn.style.cssText = 'padding:10px 20px;font-size:13px;white-space:nowrap';
  saveBtn.textContent = 'Save Key';
  saveBtn.onclick = () => {
    const val = keyInput.value.trim();
    if (!val) {
      alert('Please paste your API key first.');
      return;
    }
    if (!val.startsWith('sk-ant-')) {
      if (!confirm('This key doesn\'t look like an Anthropic key (should start with sk-ant-). Save anyway?')) return;
    }
    anthropicKey = val;
    localStorage.setItem('anthropic_key', anthropicKey);
    dot.style.background = '#4CAF50';
    statusTxt.textContent = '✓ API key saved';
    saveBtn.textContent = '✓ Saved!';
    setTimeout(() => saveBtn.textContent = 'Save Key', 2000);
  };

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn btn-outline';
  clearBtn.style.cssText = 'padding:10px 14px;font-size:13px;color:var(--red);border-color:var(--red)';
  clearBtn.textContent = 'Clear';
  clearBtn.onclick = () => {
    if (confirm('Remove saved API key?')) {
      anthropicKey = '';
      localStorage.removeItem('anthropic_key');
      keyInput.value = '';
      dot.style.background = '#E53935';
      statusTxt.textContent = 'No API key set';
    }
  };

  inputRow.appendChild(keyInput);
  inputRow.appendChild(saveBtn);
  inputRow.appendChild(clearBtn);
  apiCard.appendChild(inputRow);

  apiCard.insertAdjacentHTML('beforeend', `
    <div style="font-size:11.5px;color:var(--gray);margin-top:4px">
      Your key is stored only in this browser's local storage. It is never sent to anyone except Anthropic's API directly.
    </div>
  `);

  wrap.appendChild(apiCard);

  // ── SYNC SECTION SHORTCUT ──
  const syncCard = document.createElement('div');
  syncCard.className = 'card';
  syncCard.innerHTML = `<div class="h2">Script Sync</div>
    <p class="body-text">Sync your illness scripts across Mac, iPad, and iPhone via GitHub Gist.</p>`;
  const syncBtn = document.createElement('button');
  syncBtn.className = 'btn btn-outline';
  syncBtn.textContent = '☁️ Open Sync Settings';
  syncBtn.onclick = () => openSyncModal();
  syncCard.appendChild(syncBtn);
  wrap.appendChild(syncCard);

  main.appendChild(wrap);
}
