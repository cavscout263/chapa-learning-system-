          <div style="font-size:11.5px;color:var(--gray);margin-bottom:7px"><strong>Best for:</strong> ${ct.best}</div>
          ${codeBlock(ct.ex)}</div>`).join('')+
        `<div class="h2">Deck Structure</div>`+
        codeBlock(`📁 PA School\n   └── CVP\n        ├── Lecture (Claude-generated)\n        └── AMBOSS (add-on generated)\n   └── Heme / IIM\n   └── GI / GU / Renal\n   └── [one sub-deck per block]`)+
        `<div class="h2">The 3-Year Strategy</div>
        <div class="tbl-wrap"><table><thead><tr><th>Year</th><th>Strategy</th></tr></thead><tbody>
          <tr><td style="font-weight:600">Year 1</td><td>Build the deck — 20 new cards/day, every block</td></tr>
          <tr><td style="font-weight:600">Year 2</td><td>Maintain + deepen — Year 1 cards stay alive via reviews; Year 2 adds nuance</td></tr>
          <tr><td style="font-weight:600">Year 3</td><td>Reviews only during rotations. Reactivate relevant block deck 2 weeks before each rotation.</td></tr>
        </tbody></table></div>`
      );
      break;
    }

    // ── AMBOSS ──────────────────────────────────────────────
    case 'amboss': {
      card(`<div class="sec-title"><span class="sec-num">07</span>AMBOSS Protocol</div><div class="divider"></div>
        <p class="body-text">AMBOSS has one job: force you to apply your knowledge under pressure. Every question is clinical reasoning practice — incomplete information, a decision required.</p>`);
      card(
        `<div class="h2">The Wrong Answer Protocol</div>
        <ol class="nlist">
          <li>What did I think the answer was and why?</li>
          <li>What was the actual answer and the key mechanism?</li>
          <li>Which illness script does this belong to? Open it in Notability.</li>
          <li>Is there a gap in my script this exposed? If yes — update the script + make one add-on card now.</li>
        </ol>`+
        callout('blue','Time Per Wrong Answer: 3–4 Minutes','The moment you find yourself reading the full AMBOSS article, you have left question review and entered passive reading. Stop. Return to the protocol.')+
        `<div class="h2">AMBOSS Add-On Rules</div>
        <ul class="blist">
          <li class="bold">One card per wrong question. Resist the temptation to make three.</li>
          <li class="bold">Card it immediately or not at all. The "I will card this later" pile never gets processed.</li>
          <li>Library tab requires a specific wrong answer to open — no browsing.</li>
        </ul>`+
        callout('gold','The 70% Rule',"If you are scoring below 70% on a topic — you do not need more questions. You need to rebuild that illness script first.<br/><br/>More questions on a broken foundation reinforces confusion, not understanding. Fix the script → return to questions.")
      );
      break;
    }

    // ── NOTES (5 MARKS) ──────────────────────────────────
    case 'notes': {
      card(`<div class="sec-title"><span class="sec-num">08</span>The 5-Mark System</div><div class="divider"></div>
        <p class="body-text">Five marks only. Every mark beyond these five costs you listening time. Each has a strict word cap — because the cap is what keeps you in the lecture.</p>`);
      const marks = [
        {color:'#F5C842',name:'YELLOW — Key Emphasis',tool:'Highlighter, yellow',when:'Professor slows, repeats, says "important" or "high yield." Bold slide headers. Content you partially know.',action:'Swipe only. Zero words. Return immediately to listening.',rule:'NEVER stop to think. Swipe and return.',count:'6–10 per lecture. More than 15 = everything highlighted = nothing highlighted.'},
        {color:'#E53935',name:'RED — Confusion Flag',tool:'Pen, red color',when:'Missed something. Term you do not know. Followed argument but lost conclusion. Realized you drifted.',action:'Write ? + 1–3 words max. Return immediately to listening. Resolution happens in post-processing via tap-to-playback — NOT now.',rule:'NEVER stop to figure it out in the moment. Write 3 words and keep listening.',count:'2–5 per lecture. More than 8 = significant drift. More than 10 = you are flagging absence, not confusion.'},
        {color:'#2E6DA4',name:'BLUE — Connection',tool:'Pen, blue color',when:'Content connects to prior lecture, a clinical patient, your ER experience, different organ system.',action:'Write the connection in 5 words or fewer. This is the hyperfocus interrupt — it gives the thread a container so your brain releases it.',rule:'5-word ceiling. If you cannot say it in 5 words you are explaining, not tagging.',count:'1–3 per lecture. More than 5 = you connected instead of listened.'},
        {color:'#2E7D4F',name:'GREEN ★ — Anki Flag',tool:'Pen, green color. Draw a ★',when:'Discrete, testable, high-yield concept. Pathognomonic finding, gold standard test, first-line treatment, must-not-miss DDx feature.',action:'Draw ★ at the slide TRANSITION — not mid-sentence. 2 seconds. Claude does the card generation later.',rule:'ONE star per concept. At transitions only. Not one star per fact on a dense slide.',count:'3–8 per lecture. Fewer than 3 = under-flagged. More than 10 = you stopped distinguishing card-worthy from important.'},
        {color:'#E8680A',name:'ORANGE ↗ — AMBOSS Lookup',tool:'Pen, orange. Draw ↗ + 2 words',when:'Lecture gave you a clinical fact without the mechanism or depth you need to understand it. You know you will need AMBOSS.',action:'Write ↗ + 2 words (topic name only). This goes on your post-processing lookup list.',rule:'NEVER open AMBOSS during lecture. You are building a list, not starting a session.',count:'0–3 per lecture. More than 3 = foundation gap in this block. Review AMBOSS before next lecture.'},
      ];
      const mc = appCard();
      marks.forEach(m=>{
        const row = document.createElement('div');
        row.style.cssText='border:1.5px solid '+m.color+'33;border-left:5px solid '+m.color+';border-radius:9px;padding:14px 16px;margin-bottom:14px';
        row.innerHTML=`<div style="font-weight:700;color:var(--navy);font-size:13.5px;margin-bottom:10px">${m.name}</div>
          <div style="display:grid;grid-template-columns:80px 1fr;gap:5px;row-gap:6px;font-size:12.5px;line-height:1.6">
            <span style="color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase">Tool</span><span>${m.tool}</span>
            <span style="color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase">When</span><span>${m.when}</span>
            <span style="color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase">Action</span><span><strong>${m.action}</strong></span>
            <span style="color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase">Hard Rule</span><span style="color:#B91C1C;font-weight:600">${m.rule}</span>
            <span style="color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase">Count</span><span style="font-style:italic">${m.count}</span>
          </div>`;
        mc.appendChild(row);
      });
      mc.insertAdjacentHTML('beforeend', `<div class="h2">Combined Count Rule</div>`);
      mc.insertAdjacentHTML('beforeend', `<div class="tbl-wrap"><table><thead><tr><th>Mark</th><th>Target</th><th>Over-Count Signal</th></tr></thead><tbody>
        <tr><td>🟡 Yellow</td><td>6–10</td><td>&gt;15: tighten criteria</td></tr>
        <tr><td>🔴 Red</td><td>2–5</td><td>&gt;8: use drift recovery more aggressively</td></tr>
        <tr><td>🔵 Blue</td><td>1–3</td><td>&gt;5: you connected instead of listened</td></tr>
        <tr><td>🟢 Green ★</td><td>3–8</td><td>&gt;10: not distinguishing card-worthy from important</td></tr>
        <tr><td>🟠 Orange ↗</td><td>0–3</td><td>&gt;3: foundation gap — review AMBOSS before next lecture</td></tr>
        <tr style="font-weight:700"><td>TOTAL</td><td>10–20</td><td>&lt;10: possible covert drift | &gt;25: over-annotating</td></tr>
      </tbody></table></div>`);
      mc.insertAdjacentHTML('beforeend', `<div class="h2">3-Step Drift Recovery</div>`+
        callout('red','Execute in 10 Seconds','<strong>STEP 1 — NOTICE:</strong> You drifted. That is fine. Do not spiral.<br/><strong>STEP 2 — ANCHOR:</strong> Read the current slide title only.<br/><strong>STEP 3 — RED MARK:</strong> Write ? + one word. You are back.<br/><br/><em>→ Continue listening. Do not try to recover what you missed. The recording has it.</em>'));
      mc.insertAdjacentHTML('beforeend', callout('blue','Smart Notes Rule','Smart Notes is your illness script\'s raw ingredient — not the meal. Generate it immediately after lecture while memory is fresh. Paste into Claude with your illness script prompt. You are editing a draft, not writing from blank.'));
      break;
    }

    // ── LECTURE GUIDE ─────────────────────────────────────
    case 'lecture-guide': {
      card(`<div class="sec-title"><span class="sec-num">📖</span>Lecture Mastery Guide</div><div class="divider"></div>
        <p class="body-text" style="font-style:italic;color:var(--gray)">"Listening is the job. Everything else is minimum signal."</p>
        <p class="body-text">Overextended Juggler Edition · v6 · Christopher Downy · CHAPA 2025–2028<br/>Read once front-to-back before your first lecture. After that, use as an operational reference.</p>`);

      const parts = [
        {num:'Part 1',title:'Know Your Brain',icon:'🧠',color:'#7C3AED',content:`
          <div class="h2">Your ADHD Archetype: The Overextended Juggler</div>
          <p class="body-text">85th percentile ADHD traits — Very High. Your mind races in multiple directions simultaneously. You start lectures with genuine engagement. You can enter deep strategic focus when content clicks. You connect ideas across topics in ways classmates miss. You carry a quiet undercurrent of self-doubt that does not match your actual capability.</p>
          <div class="h2">Two Lecture Failure Modes</div>
          ${callout('red','Failure Mode 1: LOCKED IN','Hyperfocus trap. Professor says something interesting. Brain locks on it. You look completely engaged. You stopped listening 4 minutes ago. Professor has moved through 3 slides.<br/><br/><strong>Fix:</strong> Blue annotation — 5 words — closes the thread. Brain knows it is captured and returns to lecture.')}
          ${callout('purple','Failure Mode 2: DRIFTED OUT','Quiet failure. No hyperfocus. Brain simply detaches. Eyes on slide. Look present. Stopped processing 8 minutes ago.<br/><br/><strong>Triggers:</strong> First 10 min before meds activate, after 30-40 min sustained attention, 1pm Concerta taper.<br/><br/><strong>Fix:</strong> 3-Step Drift Recovery. Goal is not to avoid drifting — it is to reduce recovery time from 10 minutes to 10 seconds.')}
          <div class="h2">Your Advantages — These Are Real</div>
          <div class="tbl-wrap"><table><thead><tr><th>Advantage</th><th>How It Works</th></tr></thead><tbody>
            <tr><td style="font-weight:700;color:var(--navy)">Strategic Hyperfocus</td><td>When clinical content clicks — which is often in CHAPA — you go deep fast. Guard it by keeping lectures clinically relevant.</td></tr>
            <tr><td style="font-weight:700;color:var(--navy)">Cross-System Pattern Recognition</td><td>You link mechanisms across organ systems rapidly. Your brain is already doing differential diagnosis — the illness script formalizes it.</td></tr>
            <tr><td style="font-weight:700;color:var(--navy)">12 Years ER Exposure</td><td>Every disease in CHAPA exists in your implicit memory as a real patient. This patient library gives every illness script a concrete anchor your classmates cannot replicate.</td></tr>
            <tr><td style="font-weight:700;color:var(--navy)">Military Stress Tolerance</td><td>PA school volume is stressful. Your 12 years built a nervous system that does not panic under sustained pressure. You have done hard things for a long time.</td></tr>
          </tbody></table></div>
          <div class="h2">Medication Windows in Lecture</div>
          <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>State</th><th>Adjust</th></tr></thead><tbody>
            <tr><td>8:00–9:30am</td><td>Dose 1 activating</td><td>More drift risk first 15 min. Pre-lecture skim especially important. Make first annotation early to anchor yourself.</td></tr>
            <tr><td>9:30am–12:30pm</td><td>Peak Window 1</td><td>Strongest lecture window. Maximum attention. Push annotation discipline — no overwriting, no tangents.</td></tr>
            <tr><td>12:30–2:00pm</td><td>Natural taper / Dip</td><td>Sit near front. Increase annotation frequency slightly. Use 3-step recovery more frequently. Do not fight the drift.</td></tr>
            <tr><td>2:30pm+</td><td>Dose 2 activating</td><td>Recovery window. Peak Window 2 (4–7pm) is your best study output of the day.</td></tr>
          </tbody></table></div>`},
        {num:'Part 2',title:'Notability Setup',icon:'📱',color:'#2E6DA4',content:`
          <div class="h2">The 5 Features Running Your Lecture System</div>
          ${[{f:'Audio Recording',d:'Tap record BEFORE professor begins. Records everything. Critical implication: you do not need to transcribe. The recording has it. Tap-to-playback syncs audio to every annotation you make.'},
             {f:'Auto-Generated Transcript',d:'Builds live as you record. Do not read during lecture. Searchable after — if professor said "papilledema" but you cannot find it, search transcript and jump to that moment.'},
             {f:'Smart Notes (AI Summary)',d:'Tap the wand icon after lecture. Reads transcript + annotations → structured summary. Generate immediately after lecture while memory is fresh. This is your illness script\'s raw ingredient — paste into Claude.'},
             {f:'Tap-to-Playback',d:'During post-processing: tap any red mark → audio jumps to exact moment you made it → hear 30-45 seconds of lecture. 90% of red marks resolve in under 2 minutes. This replaces re-listening to full lectures.'},
             {f:'Block Folder Structure',d:'PA School → [Block Name] → Lectures / Brain Dumps / Illness Scripts. Build this during Summer Immersion before lectures begin. Export PDFs from Disease Chart Tool go into Illness Scripts folder.'}]
            .map(x=>`<div style="border-left:3px solid var(--blue);padding:10px 14px;margin-bottom:10px;background:var(--blue-lt);border-radius:0 8px 8px 0"><div style="font-weight:700;color:var(--navy);margin-bottom:4px">${x.f}</div><div style="font-size:12.5px;line-height:1.65">${x.d}</div></div>`).join('')}
          <div class="h2">Night-Before Pre-Lecture Protocol (10 Minutes)</div>
          ${callout('gold','The Night-Before Advantage','A single exposure to material before a learning event — even a 10-minute visual skim — significantly increases encoding during the lecture. Your brain looks for existing patterns to attach new content to. Over a full year, this 10-minute habit compounds into a significant retention advantage. Highest return-on-time investment in this guide.')}
          <ol class="nlist">
            <li><strong>Import the lecture PDF into Notability.</strong> Correct block → Lectures folder.</li>
            <li><strong>Scroll through at 2–3 seconds per slide.</strong> Visual priming only. No marks, no notes.</li>
            <li><strong>Identify the main disease or concept.</strong> One sentence. Write it on the title slide.</li>
            <li><strong>Write one question on the title slide.</strong> What do you not understand yet? This primes you to listen for the answer.</li>
            <li><strong>Tap Record before the professor begins.</strong> Before the first slide. Not after. Make this automatic.</li>
          </ol>`},
        {num:'Part 3',title:'The 5 Marks',icon:'✏️',color:'#2E7D4F',content:`
          <p class="body-text">Full detail in the <strong>Note-Taking (5 Marks)</strong> tab. Summary below.</p>
          <div class="tbl-wrap"><table><thead><tr><th>Mark</th><th>Color</th><th>Word Cap</th><th>Hard Rule</th></tr></thead><tbody>
            <tr><td>Yellow — Key Emphasis</td><td>🟡 Highlighter</td><td>Zero words</td><td>Swipe only. Never stop to think.</td></tr>
            <tr><td>Red — Confusion Flag</td><td>🔴 Pen</td><td>? + 3 words max</td><td>Continue listening. Resolve in post-processing.</td></tr>
            <tr><td>Blue — Connection</td><td>🔵 Pen</td><td>5 words max</td><td>Hyperfocus interrupt. Write and return.</td></tr>
            <tr><td>Green ★ — Anki Flag</td><td>🟢 Pen</td><td>★ only</td><td>At slide transitions only. 2 seconds.</td></tr>
            <tr><td>Orange ↗ — AMBOSS Lookup</td><td>🟠 Pen</td><td>↗ + 2 words</td><td>NEVER open AMBOSS during lecture.</td></tr>
          </tbody></table></div>
          <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="navigate('notes')">→ See Full 5-Mark Detail</button>`},
        {num:'Part 4',title:'Drift Recovery',icon:'⚡',color:'#DC2626',content:`
          ${callout('red','3-Step Drift Recovery — Execute in 10 Seconds','<strong>STEP 1 — NOTICE:</strong> You drifted. Do not punish yourself. Noticing is already the win.<br/><strong>STEP 2 — ANCHOR:</strong> Read the current slide title only. You now know what is being discussed. That is all you need.<br/><strong>STEP 3 — RED MARK:</strong> Write ? + one word. The act of writing re-engages your attention immediately.<br/><br/>→ Continue listening. Do not try to recover what you missed. The recording has it.')}
          <div class="h2">Clinical Anchor Habit — Drift Prevention</div>
          <p class="body-text">For every major disease topic, immediately connect it to a real patient you have seen. Not abstract — a specific face, a specific moment in the ER. This costs 3 seconds. Abstract content drifts. Content attached to a real clinical moment stays.</p>
          <div class="tbl-wrap"><table><thead><tr><th>Drift Trigger</th><th>Recovery Move</th></tr></thead><tbody>
            <tr><td>Unfamiliar term</td><td>Red mark + the term. Do not look it up. Mark and listen.</td></tr>
            <tr><td>Dense slide — wall of text</td><td>Yellow swipe the section header only. Trust the recording. Listen for verbal emphasis.</td></tr>
            <tr><td>Interesting clinical tangent</td><td>Blue mark + 5 words. Give the thread a container. Close it. Return.</td></tr>
            <tr><td>Post-lunch crash / medication dip</td><td>Sit forward. Make any mark. Slow breath. Read slide title. Re-enter.</td></tr>
            <tr><td>Want to look something up</td><td>Orange ↗ + 2 words. Close the research impulse. Lookup happens after lecture.</td></tr>
            <tr><td>Missed several slides</td><td>3-Step Recovery immediately. Do not reconstruct. Current slide → red mark → continue.</td></tr>
          </tbody></table></div>`},
        {num:'Part 5',title:'The Brain Dump',icon:'🧩',color:'#7C3AED',content:`
          ${callout('purple','Why Retrieval Before Review','When you attempt to recall information — even incomplete — you force your brain to reconstruct the memory trace. This strengthens the memory in a way passive review does not.<br/><br/>If you open your slides THEN try to recall, your eyes find the answer before your brain produces it. Visual cue collapses retrieval into recognition — which feels like knowing but provides almost none of the retention benefit.')}
          <div class="h2">Brain Dump Protocol — After Every Lecture</div>
          <ol class="nlist">
            <li><strong>WHERE:</strong> Blank Notability page in Brain Dumps folder. NOT on lecture slides.</li>
            <li><strong>WHEN:</strong> Immediately after lecture. Before you open slides. Before you check your phone.</li>
            <li><strong>TIME:</strong> 5-minute timer. Write until it goes off. Then stop.</li>
            <li><strong>WRITE — 5 questions from memory only:</strong>
              <ul class="blist" style="margin-top:6px">
                <li>What disease was this lecture about?</li>
                <li>Who is the classic patient? What makes them high-risk?</li>
                <li>What did the professor keep coming back to?</li>
                <li>What was the key management decision? First-line treatment? Gold standard?</li>
                <li>What confused you during the lecture?</li>
              </ul>
            </li>
          </ol>
          ${callout('gold','The Gap Rule','The gaps in your brain dump are the highest-priority items in your illness script. Messy and incomplete is the goal. A 5-minute messy brain dump is more valuable than 20 minutes of organized slide review.')}`},
        {num:'Part 6',title:'Post-Processing',icon:'⚙️',color:'#0891B2',content:`
          <p class="body-text">Post-processing converts a lecture experience into encoded memory and durable study assets. Within 24 hours of every lecture — ideally the same evening during Peak Window 2. Total: 35–45 minutes.</p>
          ${callout('red','The 24-Hour Rule','If a lecture does not get post-processed within 24 hours, you lose approximately 60–70% of the encoding from that session. Memory decay at the lecture level is steep. This is not an exaggeration — it is why the timeline is a hard rule.')}
          <ol class="nlist">
            <li><strong>Brain Dump Cold (5 min)</strong> — Blank Notability page. 5-minute timer. From memory only. See Part 5.</li>
            <li><strong>Resolve Red Flags + Build Orange List (10 min)</strong> — Red marks: tap → listen 30-45 sec → resolve or write "IS" (illness script priority). Orange marks: write topic on lookup list. Do not open AMBOSS yet.</li>
            <li><strong>Smart Notes Review + Gap Comparison (5 min)</strong> — Generate Smart Notes. Compare to brain dump. What did Smart Notes flag that you did not write? Those are encoding gaps → priority illness script fields.</li>
            <li><strong>Nightly Log (1 min)</strong> — Four lines at bottom of brain dump page: Date + topic / One solid concept / One fuzzy concept / Cards generated today.</li>
          </ol>`},
        {num:'Part 7',title:'The Illness Script Pipeline',icon:'🔄',color:'#2E7D4F',content:`
          ${callout('green','The Core Relationship','The Disease Chart Tool IS the illness script. It is not a visualization of a separate document — it is the document. Claude drafts the content. You paste it into the Disease Chart fields. AMBOSS fills the gaps. The Disease Chart is where the illness script is finalized, stored, and exported.')}
          <div class="h2">8-Step Pipeline — Every Lecture, Every Time</div>
          <ol class="nlist">
            <li><strong>Export Smart Notes</strong> — Tap wand icon → generate → Share → Copy Text. Note which slides have Green ★ marks.</li>
            <li><strong>Open correct Claude Project</strong> — Block-specific project (CVP Project, Heme/IIM Project, etc.).</li>
            <li><strong>Claude drafts all 9 Disease Chart fields</strong> — Paste Smart Notes + use the Disease Chart Draft Prompt. Claude flags missing fields → your AMBOSS list.</li>
            <li><strong>Open Disease Chart Tool → paste → refine (20-min timer)</strong> — Go field by field. Paste Claude's draft. Edit in-field. Timer goes off → stop.</li>
            <li><strong>AMBOSS lookups → fill flagged fields</strong> — Pre-write exactly what you are looking for. Search. Navigate to that section only. Extract. Close. 5 minutes max per topic.</li>
            <li><strong>Add images → Export PDF → Notability</strong> — Screenshot ECGs, X-rays, fundoscopy from lecture slides. Upload button in Disease Chart Tool. Export PDF → import to Illness Scripts folder.</li>
            <li><strong>Claude card generation</strong> — Copy Disease Chart content → Claude Anki prompt → 15 cloze cards, prioritize Green ★.</li>
            <li><strong>Upperclassman deck check → import gaps → cap 20 new cards</strong> — Check existing deck. Skip duplicates. Import only what is absent or adds DDx nuance.</li>
          </ol>
          ${callout('gold','Minimum Viable Pipeline — When Time Runs Out','If the 8-step pipeline cannot complete (8pm hard stop approaching):<br/><strong>Fields 1–4 + Export PDF = 80% of the value.</strong><br/>You have the script, you have the PDF in Notability. Cards can wait until morning review.')}
          <div class="h2">Anti-Perfectionism Rules</div>
          <ul class="blist">
            <li><strong>Disease Chart is done when the 20-minute timer goes off — not when it is perfect.</strong></li>
            <li>If a field is longer than 2 sentences — you are explaining, not scripting. Cut it.</li>
            <li>A Disease Chart with 7/9 fields complete is more valuable than a perfect 9/9 card you make Saturday.</li>
            <li>Timer goes off — you export. Not 22 minutes. Export what you have.</li>
            <li>The card gets better every time an AMBOSS question exposes a gap. That is the intended update mechanism.</li>
          </ul>
          <button class="btn btn-gold" style="margin-top:10px" onclick="navigate('script-builder')">✎ Open Disease Chart Tool →</button>`},
        {num:'Part 8',title:'Quick Reference',icon:'📋',color:'#C96A1A',content:`
          <p class="body-text">Print this. Keep it in front of you. The guide reduced to its minimum.</p>
          <div class="h2">The 5 Marks at a Glance</div>
          <div class="tbl-wrap"><table><thead><tr><th>Mark</th><th>Trigger</th><th>Action</th><th>Hard Rule</th></tr></thead><tbody>
            <tr><td>🟡 Yellow</td><td>Key point / emphasis</td><td>Swipe only. Zero words.</td><td>Never stop. Swipe and return.</td></tr>
            <tr><td>🔴 Red</td><td>Confusion / drifted</td><td>? + 3 words max</td><td>Continue listening. Resolve via tap-to-playback.</td></tr>
            <tr><td>🔵 Blue</td><td>Connection to prior knowledge</td><td>5 words max</td><td>5-word ceiling. Write and return.</td></tr>
            <tr><td>🟢 Green ★</td><td>Anki card concept</td><td>★ at slide transition only</td><td>One star per concept. Transitions only.</td></tr>
            <tr><td>🟠 Orange ↗</td><td>Needs AMBOSS lookup</td><td>↗ + 2 words</td><td>NEVER open AMBOSS during lecture.</td></tr>
          </tbody></table></div>
          <div class="h2">3-Step Drift Recovery</div>
          ${callout('red','10 Seconds','STEP 1: NOTICE — you drifted. Noticing is already the win.<br/>STEP 2: ANCHOR — read the current slide title only.<br/>STEP 3: RED MARK — write ? + one word. You are back. Continue.')}
          <div class="h2">Pipeline in 8 Steps</div>
          ${codeBlock('1. Smart Notes export → copy text from Notability\n2. Open correct Claude Project (block-specific)\n3. Claude prompt → draft all 9 Disease Chart fields\n4. Open Disease Chart Tool → paste → refine → 20-min timer\n5. Orange lookups → AMBOSS → fill flagged fields (5 min max each)\n6. Add lecture images → Export PDF → import to Notability Illness Scripts\n7. Claude card generation → 15 cloze cards, prioritize Green ★\n8. Upperclassman deck check → skip duplicates → cap 20 new cards\n\nMINIMUM VIABLE: Fields 1-4 + Export PDF = 80% of the value')}
          <div class="h2">Claude Prompts — Copy These</div>
          <div style="font-weight:700;color:var(--navy);margin:10px 0 4px;font-size:12.5px">Disease Chart Draft Prompt (Step 3)</div>
          ${codeBlock("Here is my Notability Smart Notes export and lecture annotations for [DISEASE].\nDraft content for each of the 9 Disease Chart fields using the template below.\nKeep each field to 1-2 sentences. Flag any field the Smart Notes could not fill\n— those are my AMBOSS lookup targets.\nNote which concepts align with my Green Star annotations for Anki card priority.\n[PASTE TEMPLATE]")}
          <div style="font-weight:700;color:var(--navy);margin:10px 0 4px;font-size:12.5px">Anki Card Generation Prompt (Step 7)</div>
          ${codeBlock("Here is my completed Disease Chart for [DISEASE].\nGenerate 15 Anki cloze deletion cards from this content.\nOne distinct concept per card. Prioritize: classic presentation, gold standard\ndiagnosis, first-line treatment, and distinguishing features vs. the DDx table.\nFlag the 3 highest-yield cards with [★].\nFormat as front/back pairs ready to import.")}
          <p style="font-style:italic;color:var(--gray);text-align:center;margin-top:20px;font-size:13px">"Listening is the job. Everything else is minimum signal."</p>`},
      ];

      parts.forEach(p=>{
        const isOpen = (window['lgOpen_'+p.num] !== false && p.num === 'Part 8') || window['lgOpen_'+p.num];
        const accordion = document.createElement('div');
        accordion.style.cssText='border:1.5px solid '+p.color+'33;border-radius:12px;margin-bottom:12px;overflow:hidden';
        const hdr = document.createElement('div');
        hdr.style.cssText='display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;background:'+p.color+'0D;border-bottom:'+(isOpen?'1.5px solid '+p.color+'22':'none');
        hdr.innerHTML=`<span style="font-size:20px">${p.icon}</span>
          <div style="flex:1"><div style="font-weight:700;color:var(--navy);font-size:13.5px">${p.num}: ${p.title}</div></div>
          <span style="color:var(--gray);font-size:18px;line-height:1">${isOpen?'−':'+'}</span>`;
        hdr.onclick=()=>{ window['lgOpen_'+p.num]=!isOpen; renderMain(); };
        accordion.appendChild(hdr);
        if(isOpen){
          const body = document.createElement('div');
          body.style.cssText='padding:18px 20px';
          body.innerHTML=p.content;
          body.querySelectorAll('button[onclick]').forEach(b=>{
            const fn = b.getAttribute('onclick');
            b.removeAttribute('onclick');
            b.onclick = new Function(fn);
          });
          accordion.appendChild(body);
        }
        const c = appCard(); c.style.padding='0'; c.appendChild(accordion);
      });
      break;
    }

    // ── CLAUDE PROMPTS ────────────────────────────────────
    case 'claude-prompts': {
      card(`<div class="sec-title"><span class="sec-num">09</span>Claude Prompt Library</div><div class="divider"></div>
        <p class="body-text">The quality of what you get from Claude is directly proportional to how specifically you prompt it. Use these exact prompts — one click to copy, paste directly into your Claude Project.</p>`);
      const c=appCard();
      PROMPTS.forEach(p=>{
        const pc=document.createElement('div'); pc.className='prompt-card';
        pc.innerHTML=`<div class="prompt-label">${p.label}</div><div class="prompt-text">${escHtml(p.text)}</div>`;
        const cb=document.createElement('button'); cb.className='copy-btn'; cb.textContent='⧉ Copy';
        cb.onclick=()=>{
          if(navigator.clipboard){navigator.clipboard.writeText(p.text).catch(()=>{});}
          else{const ta=document.createElement('textarea');ta.value=p.text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
          cb.textContent='✓ Copied!'; cb.className='copy-btn copied';
          setTimeout(()=>{cb.textContent='⧉ Copy';cb.className='copy-btn';},2000);
        };
        pc.appendChild(cb); c.appendChild(pc);
      });
      break;
    }

    // ── ACTIVE STUDY ──────────────────────────────────────
    case 'active-study': {
      card(`<div class="sec-title"><span class="sec-num">10</span>Active Study Methods</div><div class="divider"></div>`);
      card(
        callout('red','The Anti-Passive Rule','NEVER re-read an illness script passively. Always retrieve FROM it.<br/>Re-reading feels like studying and produces almost nothing.<br/>Retrieval feels harder, causes desirable difficulty, and produces retention.')+
        `<div class="h2">The Four Methods</div>`+
        [{num:1,t:'Notability AI Chat',b:'Daily · Dip Window',col:'#2E6DA4',w:'1–3:30pm · 10 minutes · Low cognitive load',tips:['Quiz me on [disease] — one question at a time, wait for my answer.','I am going to describe a patient. Tell me what disease it sounds like.','What distinguishes [Disease A] from [Disease B] based on my notes?']},
         {num:2,t:'Claude Vignette Quiz',b:'2x/week · Peak Window 2',col:'#5B3A8C',w:'4–6pm · 30–45 minutes · High cognitive load — Peak Window 2 only',tips:['Use the "Vignette Quiz" prompt from the prompt library → paste into Claude Project']},
         {num:3,t:'Cover and Recall',b:'Saturday',col:'#C96A1A',w:'Saturday morning · 20 minutes · Medium cognitive load',tips:['Open chart in Notability','Cover right side. Read the disease name. Recall every field without looking.','Uncover. Mark every field you could not recall.','Reverse: cover the name, read the features, name the disease.']},
         {num:4,t:'Teach Back',b:'Weekly · Highest Yield',col:'#2E7D4F',w:'Saturday · 1 disease per week · High cognitive load',tips:['Close everything. Explain the disease out loud — no notes.','If stuck: that is an Anki gap. Find it. Confirm there is a card for it.','Claude: "I am going to teach you [disease]. Do not help me. Tell me what I got wrong, missed, and what was unclear."']}]
        .map(m=>`<div style="border:1.5px solid ${m.col}20;border-left:4px solid ${m.col};border-radius:9px;padding:14px;margin-bottom:11px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
            <div style="font-weight:700;font-size:13.5px;color:var(--navy)">Method ${m.num}: ${m.t}</div>
            <span style="background:${m.col}14;color:${m.col};padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap">${m.b}</span>
          </div>
          <div style="font-size:11.5px;color:var(--gray);margin-bottom:8px">⏱ ${m.w}</div>
          <ul class="blist">${m.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
        </div>`).join('')+
        `<div class="h2">Stop If You Are Doing Any of These</div>`+
        ['Re-reading an illness script top to bottom','Highlighting things in a chart','Watching Osmosis without a specific question in mind','Re-listening to a full lecture recording','Browsing AMBOSS articles without a wrong answer to explain','Reorganizing your Anki deck instead of reviewing cards','Redesigning your system during an exam block']
        .map(s=>`<div style="display:flex;gap:9px;padding:7px 11px;background:var(--red-lt);border-radius:7px;margin-bottom:5px;font-size:13px;color:var(--red);font-weight:600"><span>✗</span>${s}</div>`).join('')
      );
      break;
    }

    // ── CLINICAL REASONING ────────────────────────────────
    case 'clinical-reasoning': {
      card(`<div class="sec-title"><span class="sec-num">11</span>Clinical Reasoning</div><div class="divider"></div>
        <p class="body-text">Clinical reasoning is probabilistic thinking under incomplete information. It is not a separate skill you practice — it is what happens when you have enough illness scripts loaded that your brain begins automatically pattern-matching incoming information.</p>`);
      card(
        `<div class="h2">The Patient Encounter Formula</div>`+
        codeBlock(`STEP 1  PATTERN RECOGNITION\n        Chief complaint + age + sex + key finding → illness script activates\n\nSTEP 2  ANCHOR + ADJUST\n        "My leading hypothesis is X, but I need to rule out Y"\n        Identify what single feature would change your diagnosis\n\nSTEP 3  MUST-NOT-MISS\n        "Before I commit, is there anything dangerous I am dismissing?"\n        Rare but lethal differentials that share this presentation\n\nSTEP 4  TEST TO CONFIRM\n        Pull from illness script gold standard field\n\nSTEP 5  TREAT EMPIRICALLY\n        First-line management while confirmatory workup proceeds`)+
        `<div class="h2">After Every Real Patient — The Debrief Habit</div>
        <ol class="nlist">
          <li>Open the illness script in Notability for the primary diagnosis.</li>
          <li>Ask: "What did the real patient have that my script does not capture?"</li>
          <li>Annotate the script with one line from the real case.</li>
          <li>If the presentation differed from the classic — make an Anki card for the atypical feature.</li>
        </ol>`+
        callout('green','Why This Matters','A single vivid patient encounter can make a disease stick for a decade. The debrief habit converts every clinical encounter into a permanent illness script upgrade.')
      );
      break;
    }

    // ── SCHEDULE ──────────────────────────────────────────
    case 'schedule': {
      card(`<div class="sec-title"><span class="sec-num">12</span>Daily Schedule</div><div class="divider"></div>
        <p class="body-text">Designed around your medication windows, 8–5 class day, and ADHD archetype. Every time block has a single purpose. When the purpose is complete, the block is done.</p>`);
      card(
        `<div style="background:#F8FAFC;border:1px solid var(--border);border-radius:11px;padding:16px">`+
        [{time:'6:30am',t:'',ti:'Wake + Medication',desc:'Concerta Dose 1 + Bupropion 300mg with breakfast'},
         {time:'7:00am',t:'dip',ti:'Anki Reviews',desc:'Brain.fm + Forest on. All due reviews first. 20 minutes.'},
         {time:'7:30am',t:'dip',ti:'Lecture Prep',desc:"Skim today's slides in Notability — 10 min prime only"},
         {time:'8:00am',t:'peak',ti:'⚡ PEAK WINDOW 1',desc:'IN CLASS — Record + annotate only. ⚡ ❓ 💡'},
         {time:'12:00pm',t:'dip',ti:'Lunch — No Studying',desc:'Walk outside if possible.'},
         {time:'1:00pm',t:'dip',ti:'DIP WINDOW',desc:'Notability AI chat quiz. Resolve ❓ flags. Low load only.'},
         {time:'2:30pm',t:'',ti:'Concerta Dose 2',desc:'Activates by ~3:30pm'},
         {time:'4:00pm',t:'peak',ti:'⚡ Illness Script Session',desc:'Open sources. Set 20-min timer. Write the script. Timer → stop.'},
         {time:'4:30pm',t:'peak',ti:'⚡ Claude Session',desc:'Paste Smart Notes + script. Generate Anki cards. Check for gaps.'},
         {time:'5:00pm',t:'dip',ti:'Decompress — NON-NEGOTIABLE',desc:'Walk, eat, call someone. 30 minutes. Not studying.'},
         {time:'5:30pm',t:'peak',ti:'⚡ Active Study',desc:'Mon/Wed/Fri → AMBOSS. Tue/Thu → Claude vignette quiz.'},
         {time:'6:30pm',t:'peak',ti:'⚡ Anki New Cards',desc:'Import Claude-generated cards. Add up to 20 new.'},
         {time:'7:00pm',t:'dip',ti:'Wind Down',desc:"Anki reviews if backlog. NotebookLM audio. Prep tomorrow's skim."},
         {time:'8:00pm',t:'stop',ti:'🛑 HARD STOP',desc:'No new learning. No exceptions.'}]
        .map(s=>{
          const pill=s.t==='peak'?'<span class="sched-pill sp-peak">PEAK</span>':s.t==='dip'?'<span class="sched-pill sp-dip">DIP</span>':s.t==='stop'?'<span class="sched-pill sp-stop">STOP</span>':'';
          return `<div class="sched-row"><div class="sched-time">${s.time}</div><div class="sched-block">${pill}<span style="font-size:12.5px;font-weight:700;color:${s.t==='stop'?'var(--red)':'var(--navy)'}">${s.ti}</span><div style="font-size:11.5px;color:var(--gray);margin-top:2px">${s.desc}</div></div></div>`;
        }).join('')+`</div>`+
        `<div class="h2" style="margin-top:18px">Weekly Rhythm</div>
        <div class="wk-grid">${WEEK.map(d=>`<div class="wk-day"><div class="wk-name">${d.day}</div><div class="wk-focus">${d.focus}</div><div class="wk-limit">${d.limit}</div></div>`).join('')}</div>`
      );
      break;
    }

    // ── CHAPA ──────────────────────────────────────────────
    case 'chapa': {
      card(`<div class="sec-title"><span class="sec-num">13</span>CHAPA 3-Year Roadmap</div><div class="divider"></div>
        <p class="body-text">3-year MPAS program. All courses Pass/Fail with IP. You are not chasing a GPA — you are building clinical competence for the PANCE and a career of patient care.</p>`);
      card(
        `<div class="h2">Summer Immersion — System Build Window</div>`+
        callout('gold','MPAS 5000: Use This Time to Build Infrastructure','Summer Immersion covers fundamentals of learning strategies. Build your entire system here — then freeze it before the first real block begins.')+
        `<div class="tbl-wrap"><table><thead><tr><th>Week</th><th>What to Build</th></tr></thead><tbody>
        ${[['Week 1','Notability structure — all blocks pre-created, illness script template pinned'],['Week 2','Anki deck architecture — all sub-decks created empty. AMBOSS add-on installed and tested.'],['Week 3','All Claude Projects created. Illness script template + curriculum map uploaded to each.'],['Week 4','Practice illness script on a disease you know (e.g., Type 2 Diabetes). Full workflow. Find friction. Fix it.'],['Before Fall','System LIVE, TESTED, and FROZEN. No changes once Heme/IIM I begins.']].map(([w,d],i)=>`<tr><td style="font-weight:600;${i===4?'color:var(--red)':''}">${w}</td><td style="${i===4?'font-weight:600;color:var(--red)':''}">${d}</td></tr>`).join('')}
        </tbody></table></div>
        <div class="h2">Year 3 Rotation Prep</div>
        <div class="tbl-wrap"><table><thead><tr><th>Rotation</th><th>Reactivate These Decks + Projects</th></tr></thead><tbody>
        ${[['Surgery','GI/GU/Renal + MSK + Heme/IIM'],['Primary Care I–IV','All blocks — full review mode'],['Emergency Medicine','CVP + Heme/IIM + MSK/Neuro'],['Inpatient Adult Medicine','CVP + GI/GU/Renal + Heme/IIM'],['Behavioral & Mental Health','Psychiatry + Neuro'],['Pediatric Elective','Derm/HEENT + Endo/Repro + Heme/IIM']].map(([r,d])=>`<tr><td style="font-weight:600">${r}</td><td>${d}</td></tr>`).join('')}
        </tbody></table></div>`
      );
      break;
    }

    // ── BURNOUT ──────────────────────────────────────────────
    case 'burnout': {
      card(`<div class="sec-title"><span class="sec-num">14</span>Burnout Prevention</div><div class="divider"></div>
        <p class="body-text">Burnout does not come from working hard. It comes from working without boundaries, without recovery, and without a system that tells you when you are done for the day.</p>`);
      card(
        `<div class="h2">The 8 Non-Negotiable Rules</div>`+
        [{r:'No studying after 8pm on weekdays. Ever.',i:'🕗'},{r:'Sunday afternoon is protected. No new learning after 2pm Sunday.',i:'☀️'},{r:'The 20-minute illness script rule. Timer goes off — you stop.',i:'⏱'},{r:'The good-enough card rule. An imperfect card in 30 seconds beats a perfect card never made.',i:'✓'},{r:'The system freeze rule. No redesigning your study system during an exam block.',i:'🔒'},{r:'The two-week rule. One system change every two weeks, only with evidence.',i:'📅'},{r:'No AMBOSS browsing. The library tab requires a specific wrong answer to open.',i:'🚫'},{r:'The 5pm decompression block is non-negotiable. 30 minutes. Not studying.',i:'🧘'}]
        .map((r,i)=>`<div style="display:flex;gap:11px;padding:10px 13px;background:${i%2===0?'#F8FAFC':'#fff'};border-radius:8px;margin-bottom:5px;border:1px solid var(--border);align-items:flex-start"><span style="font-size:16px;min-width:24px">${r.i}</span><div style="font-size:13px;color:#374151;font-weight:600;line-height:1.5">${r.r}</div></div>`).join('')+
        `<div class="h2" style="margin-top:20px">The System Builder Warning</div>`+
        callout('gold','When You Feel the Urge to Redesign — Read This',"Your ADHD archetype is a systems builder. When anxiety rises, your brain will generate a compelling urge to redesign your system. It will feel productive. It is avoidance.<br/><br/><strong>Ask yourself: \"Am I avoiding studying by building instead?\"</strong><br/><br/>If yes: Close the planning document. Open Anki. Do 20 cards. Come back.<br/><br/>The version of you that thrives in PA school is not the one with the best system. It is the one who ran a simple system 5 days out of 7 for three years.")
      );
      break;
    }
  }
  return wrap;
}

// BRAIN DUMP TIMER
// ══════════════════════════════════════════════════════════════

function renderBrainDump() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const wrap = document.createElement('div');

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'card';
  hdr.innerHTML = `<div class="sec-title"><span class="sec-num">⏱</span>Brain Dump Timer</div><div class="divider"></div>
    <p class="body-text">5 minutes. Memory only. No slides. No notes. Write until the timer goes off — then stop. The gaps are your illness script priorities.</p>`;
  wrap.appendChild(hdr);

  // Timer state
  let timerSeconds = 5 * 60;
  let timerInterval = null;
  let timerRunning = false;
  let timerDone = false;

  const card = document.createElement('div');
  card.className = 'card';
  card.style.textAlign = 'center';

  // Disease input
  const diseaseRow = document.createElement('div');
  diseaseRow.style.cssText = 'display:flex;gap:10px;align-items:center;margin-bottom:20px;text-align:left';
  const diseaseLabel = document.createElement('label');
  diseaseLabel.style.cssText = 'font-size:13px;font-weight:700;color:var(--navy);white-space:nowrap';
  diseaseLabel.textContent = 'Lecture / Disease:';
  const diseaseInput = document.createElement('input');
  diseaseInput.className = 'sf-input';
  diseaseInput.style.cssText = 'flex:1;height:36px';
  diseaseInput.placeholder = 'e.g. Atrial Fibrillation — CVP Block';
  diseaseRow.appendChild(diseaseLabel);
  diseaseRow.appendChild(diseaseInput);
  card.appendChild(diseaseRow);

  // Timer display
  const timerDisplay = document.createElement('div');
  timerDisplay.style.cssText = 'font-size:72px;font-weight:700;color:var(--navy);font-family:"DM Sans",sans-serif;line-height:1;margin:10px 0';
  timerDisplay.textContent = '5:00';
  card.appendChild(timerDisplay);

  const timerLabel = document.createElement('div');
  timerLabel.style.cssText = 'font-size:13px;color:var(--gray);margin-bottom:20px';
  timerLabel.textContent = 'Write from memory only. Do not open your slides.';
  card.appendChild(timerLabel);

  // Progress bar
  const progWrap = document.createElement('div');
  progWrap.style.cssText = 'height:6px;background:#E8EEF4;border-radius:3px;margin-bottom:20px;overflow:hidden';
  const progFill = document.createElement('div');
  progFill.style.cssText = 'height:100%;width:100%;background:var(--blue);border-radius:3px;transition:width .5s linear';
  progWrap.appendChild(progFill);
  card.appendChild(progWrap);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-bottom:20px';

  const startBtn = document.createElement('button');
  startBtn.className = 'btn btn-gold';
  startBtn.style.cssText = 'font-size:15px;padding:10px 28px';
  startBtn.textContent = '▶ Start Timer';

  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn btn-outline';
  resetBtn.style.cssText = 'font-size:13px;padding:10px 20px';
  resetBtn.textContent = '↺ Reset';

  btnRow.appendChild(startBtn);
  btnRow.appendChild(resetBtn);
  card.appendChild(btnRow);

  function updateDisplay() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    timerDisplay.textContent = m + ':' + String(s).padStart(2, '0');
    const pct = (timerSeconds / 300) * 100;
    progFill.style.width = pct + '%';
    progFill.style.background = timerSeconds <= 30 ? 'var(--red)' : timerSeconds <= 60 ? 'var(--gold)' : 'var(--blue)';
    timerDisplay.style.color = timerSeconds <= 30 ? 'var(--red)' : timerSeconds <= 60 ? '#C96A1A' : 'var(--navy)';
  }

  startBtn.onclick = () => {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      startBtn.textContent = '▶ Resume';
    } else {
      if (timerDone) return;
      timerRunning = true;
      startBtn.textContent = '⏸ Pause';
      timerInterval = setInterval(() => {
        timerSeconds--;
        updateDisplay();
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          timerDone = true;
          startBtn.textContent = '✓ Time\'s up';
          startBtn.disabled = true;
          startBtn.style.opacity = '0.5';
          timerDisplay.textContent = '0:00';
          progFill.style.width = '0%';
          doneMsg.style.display = 'block';
          dumpArea.style.borderColor = 'var(--green)';
          try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA').play(); } catch(e){}
        }
      }, 1000);
    }
  };

  resetBtn.onclick = () => {
    clearInterval(timerInterval);
    timerRunning = false;
    timerDone = false;
    timerSeconds = 300;
    startBtn.textContent = '▶ Start Timer';
    startBtn.disabled = false;
    startBtn.style.opacity = '1';
    doneMsg.style.display = 'none';
    dumpArea.value = '';
    dumpArea.style.borderColor = '';
    updateDisplay();
  };

  card.appendChild(btnRow);
  wrap.appendChild(card);

  // Done message
  const doneMsg = document.createElement('div');
  doneMsg.style.cssText = 'display:none;margin-bottom:16px';
  doneMsg.innerHTML = `<div class="callout green"><div class="ct">Time's up — stop writing</div>
    <div class="cb">The gaps in what you wrote are your illness script priorities. Open your slides now and compare. What's missing goes directly into your Disease Chart fields.</div></div>`;
  wrap.appendChild(doneMsg);

  // Writing area card
  const dumpCard = document.createElement('div');
  dumpCard.className = 'card';

  // 5 prompts
  const prompts = [
    '1. What disease or topic was this lecture about?',
    '2. Who is the classic patient? What makes them high-risk?',
    '3. What did the professor keep repeating or emphasize most?',
    '4. What was the key management decision? First-line treatment? Gold standard test?',
    '5. What confused you during the lecture? (Before looking at your marks — from pure memory)'
  ];
  const promptDiv = document.createElement('div');
  promptDiv.style.cssText = 'margin-bottom:12px';
  promptDiv.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">5 Questions — Answer from memory only</div>' +
    prompts.map(p => `<div style="font-size:12.5px;color:var(--navy2);padding:4px 0;border-bottom:1px solid var(--border)">${p}</div>`).join('');
  dumpCard.appendChild(promptDiv);

  const dumpArea = document.createElement('textarea');
  dumpArea.className = 'sf-input';
  dumpArea.style.cssText = 'width:100%;min-height:280px;resize:vertical;font-size:13.5px;line-height:1.8;padding:14px;box-sizing:border-box;font-family:inherit';
  dumpArea.placeholder = 'Start writing here. Do not open your slides. Messy and incomplete is the goal — the gaps are what matter.';
  dumpCard.appendChild(dumpArea);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn btn-outline btn-sm';
  copyBtn.style.cssText = 'margin-top:10px';
  copyBtn.textContent = '📋 Copy dump text';
  copyBtn.onclick = () => {
    const text = (diseaseInput.value ? diseaseInput.value + '\n\n' : '') + dumpArea.value;
    navigator.clipboard.writeText(text).then(() => { copyBtn.textContent = '✓ Copied'; setTimeout(() => copyBtn.textContent = '📋 Copy dump text', 2000); });
  };
  dumpCard.appendChild(copyBtn);

  const scriptBtn = document.createElement('button');
  scriptBtn.className = 'btn btn-gold btn-sm';
  scriptBtn.style.cssText = 'margin-top:10px;margin-left:8px';
  scriptBtn.textContent = '✎ Build Script from this →';
  scriptBtn.onclick = () => navigate('script-builder');
  dumpCard.appendChild(scriptBtn);

  wrap.appendChild(dumpCard);
  main.appendChild(wrap);
}

// VIGNETTE QUIZ
// ══════════════════════════════════════════════════════════════

function renderVignette() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const wrap = document.createElement('div');

  const hdr = document.createElement('div');
  hdr.className = 'card';
  hdr.innerHTML = `<div class="sec-title"><span class="sec-num">🩺</span>Vignette Quiz</div><div class="divider"></div>
    <p class="body-text">PANCE-style clinical vignettes generated from your saved illness scripts. Read the case, commit to a diagnosis, then reveal the answer and reasoning.</p>`;
  wrap.appendChild(hdr);

  if (scripts.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'card';
    empty.innerHTML = `<div style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:10px">🩺</div>
      <div style="font-weight:700;color:var(--navy);margin-bottom:8px">No scripts saved yet</div>
      <p style="color:var(--gray);font-size:13px">Build at least one illness script first, then come back to quiz yourself.</p>
      <button class="btn btn-gold" style="margin-top:12px" onclick="navigate('script-builder')">✎ Build a Script →</button>
    </div>`;
    wrap.appendChild(empty);
    main.appendChild(wrap);
    return;
  }

  // State
  let vigState = { phase: 'setup', script: null, vignette: null, loading: false };

  // Blocks available
  const blocks = ['All Blocks', ...new Set(scripts.map(s => s.block).filter(Boolean))];

  const controlCard = document.createElement('div');
  controlCard.className = 'card';

  // Block selector
  const selRow = document.createElement('div');
  selRow.style.cssText = 'display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px';
  const selLabel = document.createElement('span');
  selLabel.style.cssText = 'font-size:13px;font-weight:700;color:var(--navy)';
  selLabel.textContent = 'Block:';
  const blockSel = document.createElement('select');
  blockSel.className = 'sf-input';
  blockSel.style.cssText = 'height:36px;flex:1;max-width:200px';
  blocks.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; blockSel.appendChild(o); });
  selRow.appendChild(selLabel);
  selRow.appendChild(blockSel);

  // Script count display
  const countSpan = document.createElement('span');
  countSpan.style.cssText = 'font-size:12px;color:var(--gray)';
  selRow.appendChild(countSpan);
  controlCard.appendChild(selRow);

  function getFiltered() {
    const block = blockSel.value;
    return block === 'All Blocks' ? scripts : scripts.filter(s => s.block === block);
  }

  function updateCount() {
    const f = getFiltered();
    countSpan.textContent = f.length + ' script' + (f.length !== 1 ? 's' : '') + ' available';
  }
  blockSel.onchange = updateCount;
  updateCount();

  const genBtn = document.createElement('button');
  genBtn.className = 'btn btn-gold';
  genBtn.style.cssText = 'width:100%;font-size:15px;padding:12px';
  genBtn.textContent = '🎲 Generate Random Vignette';
  controlCard.appendChild(genBtn);
  wrap.appendChild(controlCard);

  // Quiz area
  const quizCard = document.createElement('div');
  quizCard.className = 'card';
  quizCard.style.display = 'none';
  wrap.appendChild(quizCard);

  genBtn.onclick = async () => {
    const filtered = getFiltered();
    if (filtered.length === 0) { alert('No scripts in this block yet.'); return; }
    const script = filtered[Math.floor(Math.random() * filtered.length)];
    vigState = { phase: 'loading', script, vignette: null, loading: true };
    quizCard.style.display = 'block';
    quizCard.innerHTML = `<div style="text-align:center;padding:30px">
      <div style="font-size:28px;margin-bottom:12px">⏳</div>
      <div style="font-weight:700;color:var(--navy);margin-bottom:6px">Generating vignette...</div>
      <div style="font-size:12.5px;color:var(--gray)">Building a PANCE-style case for ${escHtml(script.disease)}</div>
    </div>`;
    genBtn.disabled = true;
    genBtn.textContent = 'Generating...';

    try {
      const prompt = `You are a PANCE clinical vignette writer. Generate a realistic 4-6 sentence PANCE-style clinical vignette for the following illness script. 

Rules:
- Present the classic patient for this disease (age, sex, risk factors)
- Include the typical chief complaint and key symptoms
- Include 2-3 exam findings
- Include one or two relevant lab or diagnostic hints (but DO NOT name the diagnosis)
- End with: "What is the most likely diagnosis?"
- Do NOT include the diagnosis anywhere in the vignette
- After the vignette, on a new line write exactly: ANSWER_START
- Then write the diagnosis name in bold
- Then write 3-5 bullet points explaining the key reasoning clues from the vignette that point to this diagnosis
- Then write one "Key distinguishing feature vs. top mimic:" sentence

ILLNESS SCRIPT:
Disease: ${script.disease}
Block: ${script.block || ''}
Who gets it: ${script.who || ''}
Pathophysiology: ${script.pathophysiology || ''}
Presentation: ${script.presents || ''}
Pertinent negatives: ${script.pertinentNegatives || ''}
Key diagnostics: ${script.keyDiagnostics || ''}
Gold standard: ${script.confirms || ''}
Treatment: ${script.treats || ''}
Red flags: ${script.complications || ''}
Differentials: ${(script.differentials||[]).filter(d=>d.disease).map(d=>'vs '+d.disease+(d.feature?' — '+d.feature:'')).join(', ')}`;

      if (needsApiKey()) { genBtn.disabled=false; genBtn.textContent='🎲 Generate Random Vignette'; quizCard.style.display='none'; return; }
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: getAnthropicHeaders(),
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'API error: ' + response.status);
      const fullText = data.content?.[0]?.text || '';
      const parts = fullText.split('ANSWER_START');
      const vignette = parts[0].trim();
      const answer = parts[1] ? parts[1].trim() : 'See your illness script for ' + script.disease;

      vigState = { phase: 'question', script, vignette, answer, loading: false };
      renderQuizCard();
    } catch(e) {
      quizCard.innerHTML = `<div class="callout red"><div class="ct">Generation failed</div><div class="cb">${escHtml(e.message||String(e))}</div></div>`;
      genBtn.disabled = false;
      genBtn.textContent = '🎲 Generate Random Vignette';
    }
  };

  function renderQuizCard() {
    quizCard.innerHTML = '';
    const { script, vignette, answer, phase } = vigState;

    // Script label
    const label = document.createElement('div');
    label.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:14px';
    label.innerHTML = `<span style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em">Clinical Vignette — ${escHtml(script.block || 'Unknown Block')}</span>`;
    quizCard.appendChild(label);

    // Vignette text
    const vigText = document.createElement('div');
    vigText.style.cssText = 'background:var(--blue-lt);border-left:4px solid var(--blue);border-radius:0 9px 9px 0;padding:16px 18px;margin-bottom:18px;font-size:14px;line-height:1.85;color:var(--navy2)';
    vigText.textContent = vignette;
    quizCard.appendChild(vigText);

    const question = document.createElement('div');
    question.style.cssText = 'font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px';
    question.textContent = 'What is the most likely diagnosis?';
    quizCard.appendChild(question);

    if (phase === 'question') {
      // Commit box
      const commitWrap = document.createElement('div');
      commitWrap.style.cssText = 'display:flex;gap:10px;margin-bottom:14px';
      const commitInput = document.createElement('input');
      commitInput.className = 'sf-input';
      commitInput.style.cssText = 'flex:1;height:40px;font-size:14px';
      commitInput.placeholder = 'Type your diagnosis before revealing...';
      const revealBtn = document.createElement('button');
      revealBtn.className = 'btn btn-gold';
      revealBtn.style.cssText = 'padding:10px 20px;font-size:14px';
      revealBtn.textContent = 'Reveal Answer';
      revealBtn.onclick = () => {
        vigState.userAnswer = commitInput.value;
        vigState.phase = 'revealed';
        renderQuizCard();
      };
      commitInput.onkeydown = (e) => { if(e.key==='Enter') revealBtn.click(); };
      commitWrap.appendChild(commitInput);
      commitWrap.appendChild(revealBtn);
      quizCard.appendChild(commitWrap);

    } else if (phase === 'revealed') {
      // User answer
      if (vigState.userAnswer) {
        const userAns = document.createElement('div');
        userAns.style.cssText = 'background:var(--gold-lt);border-left:4px solid var(--gold);border-radius:0 9px 9px 0;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--navy2)';
        userAns.innerHTML = `<strong style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray)">Your answer:</strong><br/>${escHtml(vigState.userAnswer)}`;
        quizCard.appendChild(userAns);
      }

      // Answer reveal
      const ansDiv = document.createElement('div');
      ansDiv.style.cssText = 'background:var(--green-lt);border-left:4px solid var(--green);border-radius:0 9px 9px 0;padding:16px 18px;margin-bottom:16px';
      const ansContent = answer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/^- /gm, '• ').replace(/\n/g, '<br/>');
      ansDiv.innerHTML = `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:8px">Answer + Reasoning</div><div style="font-size:13.5px;line-height:1.8;color:var(--navy2)">${ansContent}</div>`;
      quizCard.appendChild(ansDiv);

      // View script button
      const viewRow = document.createElement('div');
      viewRow.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap';
      const viewBtn = document.createElement('button');
      viewBtn.className = 'btn btn-outline btn-sm';
      viewBtn.textContent = '📋 View Full Script';
      viewBtn.onclick = () => {
        const s = vigState.script;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto';
        const modal = document.createElement('div');
        modal.style.cssText = 'background:#fff;border-radius:16px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto';
        modal.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy)">${escHtml(s.disease)}</div>
          <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8">×</button>
        </div>`;
        const fields = [{l:'Who Gets It',v:s.who},{l:'Pathophysiology',v:s.pathophysiology},{l:'Presentation',v:s.presents},{l:'Pertinent Negatives',v:s.pertinentNegatives},{l:'Key Diagnostics',v:s.keyDiagnostics},{l:'Gold Standard',v:s.confirms},{l:'Treatment',v:s.treats},{l:'Red Flags',v:s.complications}];
        fields.forEach(f=>{
          if(!f.v) return;
          modal.innerHTML += `<div style="margin-bottom:10px"><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:3px">${f.l}</div><div style="font-size:13px;line-height:1.7;color:var(--navy2)">${escHtml(f.v)}</div></div>`;
        });
        modal.innerHTML += `<button class="btn btn-gold" style="width:100%;margin-top:14px" onclick="this.closest('div[style*=fixed]').remove()">Close</button>`;
        overlay.className = 'modal-overlay';
        overlay.appendChild(modal);
        overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
        document.body.appendChild(overlay);
      };

      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn btn-gold btn-sm';
      nextBtn.textContent = '🎲 Next Vignette';
      nextBtn.onclick = () => { genBtn.disabled = false; genBtn.textContent = '🎲 Generate Random Vignette'; quizCard.style.display = 'none'; };
      viewRow.appendChild(viewBtn);
      viewRow.appendChild(nextBtn);
      quizCard.appendChild(viewRow);

      genBtn.disabled = false;
      genBtn.textContent = '🎲 Generate Random Vignette';
    }
  }

  main.appendChild(wrap);
}

// ANKI CARD BUILDER
