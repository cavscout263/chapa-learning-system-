<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PA System"/>
<title>CHA/PA Learning System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2340;--navy2:#1B3A5C;--blue:#2E6DA4;--blue-lt:#EEF5FC;
  --gold:#C9952A;--gold-lt:#FFF8E8;
  --green:#2E7D4F;--green-lt:#EDF7F2;
  --red:#B53030;--red-lt:#FEF2F2;
  --purple:#5B3A8C;--purple-lt:#F3EFFE;
  --gray:#6B7280;--border:#E5ECF4;--bg:#F0F4F8;
  --sw:256px;--radius:12px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:#1A2332}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#E5ECF4}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

/* ── LAYOUT ── */
#sidebar{position:fixed;left:0;top:0;height:100vh;width:var(--sw);background:var(--navy);overflow-y:auto;z-index:200;display:flex;flex-direction:column;transition:transform .25s}
#main{margin-left:var(--sw);padding:28px 32px;min-height:100vh}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(--navy);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;color:#fff;font-size:18px;line-height:1}

/* ── NAV ── */
.nav-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(201,149,42,.3)}
.nav-brand h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:13.5px;line-height:1.4}
.nav-brand p{color:rgba(255,255,255,.4);font-size:10.5px;margin-top:3px}
.nav-items{flex:1;padding:8px 0}
.nav-group-label{padding:14px 18px 4px;font-size:9.5px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;border-left:3px solid transparent;color:rgba(255,255,255,.6);font-size:12px;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(46,109,164,.2);color:rgba(255,255,255,.9);border-left-color:rgba(201,149,42,.4)}
.nav-item.active{background:rgba(46,109,164,.3);color:#fff;border-left-color:var(--gold);font-weight:600}
.nav-num{font-size:10px;color:var(--gold);font-weight:700;min-width:20px}
.nav-footer{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:10.5px;color:rgba(255,255,255,.28)}

/* ── CARDS & TYPE ── */
.card{background:#fff;border-radius:var(--radius);padding:30px;margin-bottom:22px;box-shadow:0 1px 3px rgba(15,35,64,.07),0 4px 14px rgba(15,35,64,.04);border:1px solid var(--border)}
.sec-title{font-family:'Playfair Display',serif;font-size:23px;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:12px}
.sec-num{background:var(--gold);color:#fff;font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.divider{height:3px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;margin:8px 0 20px;width:70px}
.h2{font-size:15.5px;font-weight:700;color:var(--navy2);margin:24px 0 10px;display:flex;align-items:center;gap:7px}
.h2::before{content:'';display:block;width:4px;height:15px;background:var(--blue);border-radius:2px;flex-shrink:0}
.body-text{font-size:13.5px;line-height:1.75;color:#374151;margin-bottom:10px}

/* ── CALLOUT ── */
.callout{border-radius:9px;padding:16px 18px;margin:12px 0;border-left:4px solid}
.callout.gold{background:var(--gold-lt);border-color:var(--gold)}.callout.gold .ct{color:var(--gold)}
.callout.blue{background:var(--blue-lt);border-color:var(--blue)}.callout.blue .ct{color:var(--blue)}
.callout.green{background:var(--green-lt);border-color:var(--green)}.callout.green .ct{color:var(--green)}
.callout.red{background:var(--red-lt);border-color:var(--red)}.callout.red .ct{color:var(--red)}
.callout.purple{background:var(--purple-lt);border-color:var(--purple)}.callout.purple .ct{color:var(--purple)}
.ct{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.cb{font-size:13px;line-height:1.75;color:#374151}

/* ── CODE ── */
.code{background:#F0F5FA;border:1px solid #D1DDE8;border-radius:8px;padding:13px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.85;color:var(--navy2);white-space:pre;overflow-x:auto}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;margin:10px 0;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-size:11.5px;font-weight:600}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;color:#374151}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#F8FAFC}

/* ── LISTS ── */
.blist{list-style:none;margin:6px 0 10px}
.blist li{padding:3px 0 3px 17px;position:relative;font-size:13px;color:#374151;line-height:1.6}
.blist li::before{content:'•';position:absolute;left:0;color:var(--blue);font-weight:700}
.blist li.bold{font-weight:600;color:#1A2332}.blist li.bold::before{color:var(--gold)}
.nlist{list-style:none;counter-reset:s;margin:6px 0 10px}
.nlist li{counter-increment:s;padding:5px 0 5px 26px;position:relative;font-size:13px;color:#374151;line-height:1.6;border-left:2px solid var(--border);margin-left:10px;padding-left:13px;margin-bottom:5px}
.nlist li::before{content:counter(s);position:absolute;left:-11px;top:5px;background:var(--blue);color:#fff;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* ── TAGS ── */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;margin:2px}
.tag.blue{background:var(--blue-lt);color:var(--blue)}.tag.gold{background:var(--gold-lt);color:var(--gold)}
.tag.green{background:var(--green-lt);color:var(--green)}.tag.red{background:var(--red-lt);color:var(--red)}
.tag.gray{background:#F3F4F6;color:var(--gray)}.tag.purple{background:var(--purple-lt);color:var(--purple)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;user-select:none}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#B8841F}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2560A0}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#256642}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid #CBD5E0}.btn-outline:hover{background:#F8FAFC}
.btn-ghost{background:transparent;color:var(--gray);border:1px solid var(--border)}.btn-ghost:hover{background:#F8FAFC;color:var(--navy)}
.btn-red{background:var(--red-lt);color:var(--red);border:1px solid #FCA5A5}.btn-red:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;cursor:pointer;border:none;font-size:14px;transition:all .15s;font-family:'DM Sans',sans-serif}
.icon-btn.add{background:var(--blue-lt);color:var(--blue)}.icon-btn.add:hover{background:var(--blue);color:#fff}
.icon-btn.remove{background:var(--red-lt);color:var(--red)}.icon-btn.remove:hover{background:var(--red);color:#fff}
.copy-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:var(--blue-lt);border:1px solid #C5D8EE;border-radius:6px;font-size:11.5px;font-weight:500;color:var(--blue);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.copy-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.copy-btn.copied{background:var(--green);color:#fff;border-color:var(--green)}

/* ── PROGRESS ── */
.pbar{background:#E5ECF4;border-radius:20px;height:7px;overflow:hidden}
.pfill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--green),#3DAA6A);transition:width .4s}

/* ── CHECKLIST ── */
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:8px 11px;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .12s}
.chk-item:hover{background:#F0F5FA}
.chk-item.done{opacity:.5}.chk-item.done .chk-text{text-decoration:line-through}
.chk-box{width:19px;height:19px;border-radius:5px;border:2px solid #CBD5E0;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.chk-box.on{background:var(--green);border-color:var(--green)}
.chk-text{font-size:13px;line-height:1.5;color:#374151}

/* ── SCRIPT BUILDER ── */
.sf-label{font-size:10.5px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.sf-input{width:100%;border:1.5px solid #D1DDE8;border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;line-height:1.5;color:#374151;resize:vertical;transition:border-color .15s;background:#fff}
.sf-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,109,164,.1)}
.sf-input.name{height:40px;min-height:auto;font-size:15px;font-weight:600;resize:none}
.diff-row{display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;align-items:start;margin-bottom:8px}
.diff-row .sf-input{min-height:38px;resize:none;height:38px}

/* ── SCRIPT LIBRARY ── */
.script-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:16px}
.script-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .15s,border-color .15s;cursor:pointer}
.script-card:hover{box-shadow:0 4px 16px rgba(15,35,64,.1);border-color:#C5D8EE}
.script-card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.script-card-title{font-size:14px;font-weight:700;color:var(--navy);flex:1;margin-right:8px}
.script-card-body{padding:13px 16px;font-size:12px;color:#374151;line-height:1.6}
.script-card-field{margin-bottom:7px}
.script-card-fl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.script-card-fv{font-size:12.5px;color:#374151}
.script-card-footer{padding:10px 16px;background:#F8FAFC;border-top:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap}
.img-thumb{width:70px;height:70px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:transform .15s}
.img-thumb:hover{transform:scale(1.05)}
.img-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-type-badge{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.img-type-clinical{background:#EEF5FC;color:var(--blue)}
.img-type-radiology{background:#F3EFFE;color:var(--purple)}
.img-type-pathology{background:var(--gold-lt);color:var(--gold)}
.img-type-other{background:#F3F4F6;color:var(--gray)}

/* ── IMAGE MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--navy)}
.modal-close{background:none;border:none;font-size:22px;color:var(--gray);cursor:pointer;line-height:1;padding:2px 6px}
.modal-body{padding:22px}
.modal-img-full{width:100%;max-height:450px;object-fit:contain;border-radius:10px;background:#F8FAFC;border:1px solid var(--border);margin-bottom:12px}

/* ── DISEASE CHART ── */
.chart-table table{font-size:12px}
.chart-table th{font-size:11px;white-space:nowrap}
.chart-table td{min-width:140px;max-width:240px;font-size:11.5px;vertical-align:top;line-height:1.55}
.chart-table td.disease-name{font-weight:700;color:var(--navy);font-size:12.5px;min-width:130px;position:sticky;left:0;background:#fff;z-index:2;box-shadow:2px 0 4px rgba(0,0,0,.06)}
.chart-table tr:nth-child(even) td.disease-name{background:#F8FAFC}
.chart-img-cell{display:flex;gap:4px;flex-wrap:wrap}
.chart-img-cell img{width:44px;height:44px;object-fit:cover;border-radius:5px;border:1px solid var(--border);cursor:pointer}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:11px;padding:13px 16px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:22px;font-weight:700;color:var(--navy);margin-top:2px;font-family:'Playfair Display',serif}
.stat-sub{font-size:10.5px;color:var(--gray);margin-top:1px}

/* ── MED WINDOWS ── */
.mw{border-radius:9px;padding:12px 15px;margin-bottom:7px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.mw.peak{background:linear-gradient(135deg,var(--gold-lt),#FEF3C7);border:1.5px solid var(--gold)}
.mw.dip{background:#F8FAFC;border:1.5px solid var(--border)}
.mw.stop{background:var(--red-lt);border:1.5px solid var(--red)}
.mw-time{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--navy);min-width:95px}
.mw-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.mw.peak .mw-badge{background:var(--gold);color:#fff}
.mw.dip .mw-badge{background:#E5ECF4;color:var(--gray)}
.mw.stop .mw-badge{background:var(--red);color:#fff}
.mw-desc{font-size:12.5px;color:#374151;line-height:1.5}

/* ── WEEK GRID ── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:10px}
.wk-day{background:#F8FAFC;border:1.5px solid var(--border);border-radius:9px;padding:10px 8px;text-align:center}
.wk-name{font-size:9.5px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.wk-focus{font-size:10.5px;color:#374151;line-height:1.4}
.wk-limit{font-size:9.5px;color:var(--red);margin-top:3px;font-weight:600}

/* ── SCHEDULE ── */
.sched-row{display:grid;grid-template-columns:88px 1fr;margin-bottom:2px}
.sched-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);padding:8px 10px 8px 0;border-right:2px solid var(--border);display:flex;align-items:center}
.sched-block{padding:7px 0 7px 13px;border-bottom:1px solid #F0F4F8}
.sched-pill{display:inline-block;padding:1px 7px;border-radius:4px;font-size:9.5px;font-weight:600;margin-right:5px}
.sp-peak{background:var(--gold-lt);color:var(--gold)}
.sp-dip{background:#F3F4F6;color:var(--gray)}
.sp-stop{background:var(--red-lt);color:var(--red)}

/* ── TOOL CARDS ── */
.tool-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;transition:box-shadow .15s}
.tool-card:hover{box-shadow:0 3px 12px rgba(15,35,64,.09)}
.tool-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer}
.tool-name{font-size:13.5px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.tool-body{padding:13px 15px;border-top:1px solid var(--border)}

/* ── PROMPT CARDS ── */
.prompt-card{background:#F8FAFC;border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px}
.prompt-label{font-size:10.5px;font-weight:700;color:var(--navy);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.prompt-text{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.65;color:#374151;background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:7px;white-space:pre-wrap}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--gray)}
.empty-state .icon{font-size:48px;margin-bottom:14px}
.empty-state h3{font-size:17px;font-weight:700;color:var(--navy2);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.6;max-width:360px;margin:0 auto 18px}

/* ── FILTERS ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.filter-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.search-input{flex:1;min-width:180px;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:#374151;background:#fff;max-width:320px}
.search-input:focus{outline:none;border-color:var(--blue)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hamburger{display:flex}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #overlay.open{display:block}
  #main{margin-left:0;padding:18px 15px;padding-top:56px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .wk-grid{grid-template-columns:repeat(4,1fr)}
  .card{padding:20px 16px}
  .script-grid{grid-template-columns:1fr}
  .diff-row{grid-template-columns:1fr 1fr 28px}
  .two-col,.three-col{grid-template-columns:1fr!important}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- ── LIGHTBOX ── -->
<div class="modal-bg" id="lightbox" onclick="closeLightbox(event)">
  <div class="modal" style="background:#111;border-radius:12px;overflow:hidden;max-width:90vw">
    <img id="lightbox-img" src="" style="width:100%;max-height:85vh;object-fit:contain;display:block"/>
    <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      <span id="lightbox-caption" style="color:rgba(255,255,255,.7);font-size:12px"></span>
      <button onclick="closeLightbox()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px">✕ Close</button>
    </div>
  </div>
</div>

<!-- ── SCRIPT VIEW MODAL ── -->
<div class="modal-bg" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="vm-title">Disease</div>
      <button class="modal-close" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body" id="vm-body"></div>
  </div>
</div>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- ── SIDEBAR ── -->
<nav id="sidebar">
  <div class="nav-brand">
    <h1>CHA/PA Learning System</h1>
    <p>Christopher Downy · 2025–2028</p>
  </div>
  <div class="nav-items" id="nav-items"></div>
  <div class="nav-footer" id="nav-footer">

// ── GITHUB GIST SYNC ──────────────────────────────────────────
const SYNC = {
  async push(data) {
    if (!syncToken || !syncGistId) return false;
    try {
      const r = await fetch(`https://api.github.com/gists/${syncGistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${syncToken}`, 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' },
        body: JSON.stringify({ files: { 'chapa_scripts.json': { content: JSON.stringify(data) } } })
      });
      return r.ok;
    } catch(e) { return false; }
  },
  async pull() {
    if (!syncToken || !syncGistId) return null;
    try {
      const r = await fetch(`https://api.github.com/gists/${syncGistId}`, {
        headers: { 'Authorization': `token ${syncToken}`, 'X-GitHub-Api-Version': '2022-11-28' }
      });
      if (!r.ok) return null;
      const d = await r.json();
      const raw = d.files?.['chapa_scripts.json']?.content;
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },
  async createGist() {
    if (!syncToken) return null;
    try {
      const r = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': `token ${syncToken}`, 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' },
        body: JSON.stringify({ description: 'CHAPA Learning System — Script Data', public: false, files: { 'chapa_scripts.json': { content: '[]' } } })
      });
      if (!r.ok) return null;
      const d = await r.json();
      return d.id;
    } catch(e) { return null; }
  },
  async validateToken(token) {
    try {
      const r = await fetch('https://api.github.com/gists?per_page=1', {
        headers: { 'Authorization': `token ${token}`, 'X-GitHub-Api-Version': '2022-11-28' }
      });
      return r.ok;
    } catch(e) { return false; }
  }
};

let syncPushTimer = null;
function syncPush() {
  if (!syncToken || !syncGistId) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(async () => {
    setSyncStatus('syncing');
    const ok = await SYNC.push(scripts);
    setSyncStatus(ok ? 'ok' : 'error');
  }, 1500); // debounce 1.5s so rapid saves don't flood API
}

async function syncPull() {
  if (!syncToken || !syncGistId) return;
  setSyncStatus('syncing');
  const remote = await SYNC.pull();
  if (remote === null) { setSyncStatus('error'); return; }
  // Merge: remote wins for any script not in local, keep local if newer
  const localMap = {};
  scripts.forEach(s => localMap[s.id] = s);
  const remoteMap = {};
  remote.forEach(s => remoteMap[s.id] = s);
  const merged = Object.values({ ...remoteMap, ...localMap });
  // De-dupe by id
  const seen = new Set();
  scripts = merged.filter(s => { if(seen.has(s.id)) return false; seen.add(s.id); return true; });
  try { localStorage.setItem('pa_scripts', JSON.stringify(scripts)); } catch(e) {}
  setSyncStatus('ok');
  updateNavFooter();
  if (activeSection === 'library' || activeSection === 'chart') renderMain();
}

function setSyncStatus(status) {
  syncStatus = status;
  const el = document.getElementById('sync-status-dot');
  const txt = document.getElementById('sync-status-txt');
  if (!el || !txt) return;
  const map = {
    idle:    { color: 'rgba(255,255,255,.2)', label: 'Not connected' },
    syncing: { color: '#F5C842',              label: 'Syncing...' },
    ok:      { color: '#4CAF50',              label: 'Synced ✓' },
    error:   { color: '#E53935',              label: 'Sync error' },
    offline: { color: 'rgba(255,255,255,.2)', label: 'Offline' },
  };
  const s = map[status] || map.idle;
  el.style.background = s.color;
  txt.textContent = s.label;
}

function h(tag,attrs,children) {
  const e = document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(typeof children==='string') e.innerHTML=children;
  else if(Array.isArray(children)) children.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?Object.assign(document.createTextNode(''),{data:c}):c));
  return e;
}

function el(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstElementChild;
}

function callout(type,title,bodyHtml) {
  return `<div class="callout ${type}">${title?`<div class="ct">${title}</div>`:''}
    <div class="cb">${bodyHtml}</div></div>`;
}

function codeBlock(text) {
  return `<div class="code">${escHtml(text)}</div>`;
}

function tag(text,type='blue') {
  return el(`<span class="tag ${type}">${text}</span>`);
}

function btnEl(text,cls,onclick) {
  const b=el(`<button class="btn ${cls}">${text}</button>`);
  b.onclick=onclick; return b;
}

function pbar(pct) {
  return el(`<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>`);
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ══════════════════════════════════════════════════════════════
// SCRIPT BUILDER
// ══════════════════════════════════════════════════════════════

function getEmptyDraft() {
  return {
    disease:'',who:'',pathophysiology:'',presents:'',
    pertinentNegatives:'',keyDiagnostics:'',
    confirms:'',treats:'',complications:'',
    differentials:[{disease:'',feature:''},{disease:'',feature:''}],
    images:[],block:'CVP',tags:[]
  };
}

function getDraft() {
  const empty = getEmptyDraft();
  if(!scriptDraft.differentials) scriptDraft = {...empty,...scriptDraft,differentials:scriptDraft.differentials||[{disease:'',feature:''},{disease:'',feature:''}]};
  ['pertinentNegatives','keyDiagnostics','complications'].forEach(k=>{ if(scriptDraft[k]===undefined) scriptDraft[k]=''; });
  return scriptDraft;
}

function updateDraft(k,v) { scriptDraft[k]=v; saveDraft(); }

function buildScriptText(s) {
  const diffs = (s.differentials||[]).filter(d=>d.disease||d.feature)
    .map(d=>`vs. ${d.disease} — ${d.feature}`).join('\n');
  return `DISEASE: ${s.disease}  |  Block: ${s.block||''}

━━━ WHO GETS IT
${s.who||'—'}

━━━ PATHOPHYSIOLOGY
${s.pathophysiology||'—'}

━━━ HOW IT PRESENTS
${s.presents||'—'}

━━━ PERTINENT NEGATIVES
${s.pertinentNegatives||'—'}

━━━ KEY DIAGNOSTIC FINDINGS
${s.keyDiagnostics||'—'}

━━━ GOLD STANDARD / HOW YOU CONFIRM IT
${s.confirms||'—'}

━━━ HOW YOU TREAT IT
${s.treats||'—'}

━━━ RED FLAGS / COMPLICATIONS
${s.complications||'—'}

━━━ WHAT MAKES IT NOT SOMETHING ELSE
${diffs||'—'}`;
}

function renderScriptBuilder() {
  const draft = getDraft();
  const wrap = document.createElement('div');

  // header
  wrap.appendChild(el(`<div class="card">
    <div class="sec-title"><span class="sec-num">✎</span>Illness Script Builder</div>
    <div class="divider"></div>
    <p class="body-text">9-field structure. Each field: 1–2 sentences max. Set a 20-min timer before you start. Red Flags and Pertinent Negatives are the highest-yield additions for PANCE. Click Save to add to your Script Library.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
      ${['1. Who Gets It','2. Pathophysiology','3. Presentation','4. Pertinent Negatives','5. Key Diagnostics','6. Gold Standard','7. Treatment','8. Red Flags ⚠','9. Differentials'].map((f,i)=>`<div style="background:${i===7?'var(--red-lt)':i===3?'var(--blue-lt)':'#F8FAFC'};border:1px solid ${i===7?'var(--red)':i===3?'#C5D8EE':'var(--border)'};border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;color:${i===7?'var(--red)':'var(--navy)'}">${f}</div>`).join('')}
    </div>
  </div>`));

  const form = el(`<div class="card"></div>`);

  // Block selector
  const blockRow = el(`<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <span class="sf-label" style="margin-bottom:0">Block:</span>
  </div>`);
  BLOCKS.forEach(b=>{
    const t=el(`<button class="filter-btn${(draft.block||'CVP')===b?' on':''}" style="font-size:11px">${b}</button>`);
    t.onclick=()=>{
      updateDraft('block',b);
      blockRow.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
    };
    blockRow.appendChild(t);
  });
  form.appendChild(blockRow);

  // Disease name
  form.appendChild(el(`<div class="sf-label">🩺 Disease Name</div>`));
  const nameInput = el(`<input class="sf-input name" placeholder="e.g., Heart Failure with Reduced Ejection Fraction (HFrEF)" value="${escHtml(draft.disease||'')}"/>`);
  nameInput.oninput=()=>{ updateDraft('disease',nameInput.value); refreshPreview(); };
  form.appendChild(nameInput);
  form.appendChild(el(`<div style="height:12px"></div>`));

  // Two col fields
  const twoCol = el(`<div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px"></div>`);

  function addField(parent, label, key, placeholder, rows=3) {
    const wrap = el(`<div><div class="sf-label" style="margin-top:10px">${label}</div></div>`);
    const ta = el(`<textarea class="sf-input" rows="${rows}" placeholder="${placeholder}">${escHtml(draft[key]||'')}</textarea>`);
    ta.oninput=()=>{ updateDraft(key,ta.value); refreshPreview(); };
    wrap.appendChild(ta); parent.appendChild(wrap);
  }

  addField(twoCol,'👤 Who Gets It','who','Age / Sex / Risk factors / Classic population — one line');
  addField(twoCol,'🔬 Pathophysiology','pathophysiology','One mechanism sentence. Cause → Effect. Keep it concise.');
  form.appendChild(twoCol);

  addField(form,'🔴 How It Presents','presents','Classic patient in one sentence. Chief complaint + key symptoms + key exam findings + buzzword sign.',3);

  // ── PERTINENT NEGATIVES ──
  addField(form,'⊘ Pertinent Negatives','pertinentNegatives','What this disease classically LACKS. Features that would point toward a key differential instead. e.g., "No fever or productive cough (vs. pneumonia); no leg swelling (vs. DVT)"',2);

  // ── KEY DIAGNOSTIC FINDINGS ──
  const diagLabel = el(`<div style="margin-top:14px"><div class="sf-label">🔬 Key Diagnostic Findings</div><p style="font-size:11.5px;color:var(--gray);margin:3px 0 7px">Labs only when they change diagnosis or management. Format: Labs | Imaging | Other (ECG, biopsy, etc.)</p></div>`);
  form.appendChild(diagLabel);
  const twoColDiag = el(`<div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:14px"></div>`);
  addField(twoColDiag,'Labs + Imaging','keyDiagnostics','e.g., Labs: BNP >400 (HF), troponin elevated; Imaging: CXR shows cardiomegaly + pulmonary edema; Echo: EF <40%',3);
  addField(twoColDiag,'🥇 Gold Standard / How You Confirm It','confirms','Best single confirmatory test + WHY it is the gold standard.',2);
  form.appendChild(twoColDiag);

  const twoCol2 = el(`<div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px"></div>`);
  addField(twoCol2,'💊 How You Treat It','treats','First-line tx. Key contraindication or exception. Emergent tx if unstable.',3);
  addField(twoCol2,'🚨 Red Flags / Complications','complications','Signs of deterioration. Must-not-miss complications. When to escalate or admit. e.g., "STEMI → cath lab within 90 min; tension PTX → immediate needle decompression"',3);
  form.appendChild(twoCol2);

  // ── DIFFERENTIALS (dynamic) ──
  form.appendChild(el(`<div class="sf-label" style="margin-top:16px">⚖️ What Makes It NOT Something Else</div>`));

  const diffContainer = el(`<div id="diff-container"></div>`);
  function renderDiffs() {
    diffContainer.innerHTML='';
    draft.differentials.forEach((d,i)=>{
      const row = el(`<div class="diff-row"></div>`);
      const d1 = el(`<input class="sf-input" style="height:38px;resize:none" placeholder="vs. Disease name" value="${escHtml(d.disease||'')}"/>`);
      const d2 = el(`<input class="sf-input" style="height:38px;resize:none" placeholder="one distinguishing feature" value="${escHtml(d.feature||'')}"/>`);
      d1.oninput=()=>{ draft.differentials[i].disease=d1.value; saveDraft(); refreshPreview(); };
      d2.oninput=()=>{ draft.differentials[i].feature=d2.value; saveDraft(); refreshPreview(); };
      const rmBtn = el(`<button class="icon-btn remove" title="Remove" style="margin-top:0;height:38px;width:28px;border-radius:6px">−</button>`);
      rmBtn.onclick=()=>{ draft.differentials.splice(i,1); saveDraft(); renderDiffs(); refreshPreview(); };
      if(draft.differentials.length<=1) rmBtn.style.visibility='hidden';
      row.appendChild(d1); row.appendChild(d2); row.appendChild(rmBtn);
      diffContainer.appendChild(row);
    });
    // Add button
    const addRow = el(`<div style="margin-top:4px"></div>`);
    const addBtn = el(`<button class="btn btn-ghost btn-xs" style="gap:5px"><span style="font-size:14px;line-height:1">+</span> Add Differential</button>`);
    addBtn.onclick=()=>{ draft.differentials.push({disease:'',feature:''}); saveDraft(); renderDiffs(); };
    addRow.appendChild(addBtn); diffContainer.appendChild(addRow);
  }
  renderDiffs();
  form.appendChild(diffContainer);

  // ── IMAGES ──
  form.appendChild(el(`<div class="sf-label" style="margin-top:18px">🖼️ Images (optional)</div>`));
  form.appendChild(el(`<p style="font-size:12px;color:var(--gray);margin-bottom:10px">Upload a screenshot or lecture image directly, or paste a URL. Uploaded images are stored in the app and embed in PDF exports.</p>`));

  const imgContainer = el(`<div id="img-container"></div>`);
  function renderImages() {
    imgContainer.innerHTML='';
    (draft.images||[]).forEach((img,i)=>{
      const row = el(`<div style="border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:10px;background:#FAFBFC"></div>`);
      // Top row: upload button + URL + remove
      const topRow = el(`<div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;margin-bottom:8px"></div>`);

      // Upload button
      const uploadBtn = el(`<button class="btn btn-outline btn-sm" style="white-space:nowrap;font-size:11px;padding:5px 10px">📁 Upload</button>`);
      const fileInput = el(`<input type="file" accept="image/*" style="display:none"/>`);
      uploadBtn.onclick=()=>fileInput.click();
      fileInput.onchange=(e)=>{
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=(ev)=>{
          draft.images[i].data=ev.target.result;
          draft.images[i].url=draft.images[i].url||file.name;
          draft.images[i].label=draft.images[i].label||file.name.replace(/\.[^.]+$/,'');
          saveDraft(); renderImages();
        };
        reader.readAsDataURL(file);
      };
      topRow.appendChild(uploadBtn);
      topRow.appendChild(fileInput);

      const urlInp = el(`<input class="sf-input" style="height:34px;font-size:12px" placeholder="https://... (paste URL) or upload file above" value="${escHtml(img.url||'')}"/>`);
      urlInp.oninput=()=>{ draft.images[i].url=urlInp.value; if(draft.images[i].data&&urlInp.value==='') draft.images[i].data=''; saveDraft(); };
      topRow.appendChild(urlInp);

      const rmBtn = el(`<button class="icon-btn remove" style="height:34px;width:32px;border-radius:6px;flex-shrink:0">−</button>`);
      rmBtn.onclick=()=>{ draft.images.splice(i,1); saveDraft(); renderImages(); };
      topRow.appendChild(rmBtn);
      row.appendChild(topRow);

      // Bottom row: label + type + preview
      const btmRow = el(`<div style="display:grid;grid-template-columns:1fr 110px;gap:8px;align-items:start"></div>`);
      const metaCol = el(`<div style="display:flex;gap:8px"></div>`);
      const labelInp = el(`<input class="sf-input" style="height:32px;font-size:12px;flex:1" placeholder="Label (e.g., Chest X-ray)" value="${escHtml(img.label||'')}"/>`);
      const typeSelect = el(`<select class="sf-input" style="height:32px;font-size:12px;cursor:pointer;width:110px">
        <option value="clinical"${img.type==='clinical'?' selected':''}>Clinical</option>
        <option value="radiology"${img.type==='radiology'?' selected':''}>Radiology</option>
        <option value="pathology"${img.type==='pathology'?' selected':''}>Pathology</option>
        <option value="other"${img.type==='other'?' selected':''}>Other</option>
      </select>`);
      labelInp.oninput=()=>{ draft.images[i].label=labelInp.value; saveDraft(); };
      typeSelect.onchange=()=>{ draft.images[i].type=typeSelect.value; saveDraft(); };
      metaCol.appendChild(labelInp); metaCol.appendChild(typeSelect);
      btmRow.appendChild(metaCol);

      // Preview thumbnail
      const src = img.data || img.url;
      if(src){
        const previewWrap = el(`<div style="text-align:right"></div>`);
        const thumb = el(`<img src="${escHtml(src)}" style="height:48px;max-width:80px;object-fit:cover;border-radius:5px;border:1px solid var(--border);cursor:pointer" alt="preview"/>`);
        thumb.onclick=()=>openLightbox(src, img.label||img.type||'');
        thumb.onerror=()=>previewWrap.innerHTML='<span style="font-size:10px;color:var(--gray)">Preview unavailable</span>';
        previewWrap.appendChild(thumb);
        btmRow.appendChild(previewWrap);
        // Show upload badge if data stored
        if(img.data){
          const badge = el(`<div style="font-size:10px;color:var(--green);font-weight:700;margin-top:3px;text-align:right">✓ Stored locally</div>`);
          previewWrap.appendChild(badge);
        }
      }
      row.appendChild(btmRow);
      imgContainer.appendChild(row);
    });

    const addRow = el(`<div style="display:flex;gap:8px;margin-top:4px"></div>`);
    const addUrlBtn = el(`<button class="btn btn-ghost btn-xs" style="gap:5px"><span style="font-size:14px;line-height:1">+</span> Add via URL</button>`);
    addUrlBtn.onclick=()=>{ if(!draft.images) draft.images=[]; draft.images.push({url:'',label:'',type:'clinical',data:''}); saveDraft(); renderImages(); };
    const addFileBtn = el(`<button class="btn btn-ghost btn-xs" style="gap:5px"><span style="font-size:14px;line-height:1">📁</span> Upload Image</button>`);
    addFileBtn.onclick=()=>{
      if(!draft.images) draft.images=[];
      draft.images.push({url:'',label:'',type:'clinical',data:''});
      saveDraft();
      renderImages();
      // trigger the last upload button
      setTimeout(()=>{ const btns=imgContainer.querySelectorAll('button'); for(let b of btns){ if(b.textContent.trim()==='📁 Upload'){ b.click(); break; } } },50);
    };
    addRow.appendChild(addUrlBtn); addRow.appendChild(addFileBtn);
    imgContainer.appendChild(addRow);
  }
  renderImages();
  form.appendChild(imgContainer);

  // ── PREVIEW ──
  const previewWrap = el(`<div id="preview-wrap" style="margin-top:20px;display:${draft.disease?'block':'none'}"></div>`);
  const previewHeader = el(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div class="h2" style="margin:0">Script Preview</div></div>`);
  const previewBtns = el(`<div style="display:flex;gap:8px"></div>`);
  const clearBtn = el(`<button class="btn btn-red btn-sm">🗑 Clear Draft</button>`);
  clearBtn.onclick=()=>{ if(confirm('Clear the current draft?')){ scriptDraft=getEmptyDraft(); saveDraft(); renderScriptBuilderSection(); }};
  const copyBtn = el(`<button class="copy-btn" style="padding:6px 14px;font-size:12px">⧉ Copy for Claude</button>`);
  copyBtn.onclick=()=>{
    const txt=buildScriptText(draft);
    if(navigator.clipboard){navigator.clipboard.writeText(txt).catch(()=>{});}
    else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
    copyBtn.textContent='✓ Copied!'; copyBtn.className='copy-btn copied';
    setTimeout(()=>{copyBtn.textContent='⧉ Copy for Claude'; copyBtn.className='copy-btn';},2200);
  };
  const saveBtn = el(`<button class="btn btn-gold btn-sm">💾 Save to Library</button>`);
  saveBtn.onclick=()=>{
    const d = getDraft();
    if(!d.disease.trim()){ alert('Add a disease name first.'); return; }
    const existing = scripts.findIndex(s=>s.id===d._id);
    const obj = {...d, id: d._id||uid(), savedAt: new Date().toISOString()};
    delete obj._id;
    if(existing>=0){ scripts[existing]=obj; alert(`Updated: ${obj.disease}`); }
    else { scripts.unshift(obj); alert(`Saved: ${obj.disease}`); }
    saveScripts();
    updateNavFooter();
    // reset draft
    scriptDraft=getEmptyDraft();
    saveDraft();
    renderScriptBuilderSection();
  };
  previewBtns.appendChild(clearBtn);
  previewBtns.appendChild(copyBtn);
  previewBtns.appendChild(saveBtn);
  previewHeader.appendChild(previewBtns);
  previewWrap.appendChild(previewHeader);

  const previewCode = el(`<div class="code"></div>`);
  previewCode.textContent = buildScriptText(draft);
  previewWrap.appendChild(previewCode);

  // Preview image thumbnails
  if((draft.images||[]).filter(i=>i.url||i.data).length>0){
    const imgPreview = el(`<div style="margin-top:12px"><div class="sf-label">Image Preview</div><div class="img-row" id="img-preview-row"></div></div>`);
    (draft.images||[]).filter(i=>i.url||i.data).forEach(img=>{
      const thumb = el(`<div style="position:relative;display:inline-block"></div>`);
      const im = el(`<img src="${escHtml(img.data||img.url)}" alt="${escHtml(img.label||'')}" class="img-thumb" style="width:80px;height:80px" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'80\\' height=\\'80\\'><rect fill=\\' %23f0f4f8\\'  width=\\'80\\' height=\\'80\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' fill=\\'%236B7280\\' font-size=\\'10\\'>No image</text></svg>'"/>`);
      const badgeType = img.type||'clinical';
      const badge = el(`<div class="img-type-badge img-type-${badgeType}" style="position:absolute;bottom:4px;left:4px">${badgeType}</div>`);
      im.onclick=()=>openLightbox(img.url, img.label||img.type||'');
      thumb.appendChild(im); thumb.appendChild(badge);
      imgPreview.querySelector('.img-row').appendChild(thumb);
    });
    previewWrap.appendChild(imgPreview);
  }

  form.appendChild(previewWrap);
  wrap.appendChild(form);

  function refreshPreview() {
    previewCode.textContent = buildScriptText(getDraft());
    previewWrap.style.display = getDraft().disease ? 'block' : 'none';
  }

  document.getElementById('main').innerHTML='';
  document.getElementById('main').appendChild(wrap);
}

function renderScriptBuilderSection() { renderScriptBuilder(); }

function renderLibrary() {
  const main = document.getElementById('main');
  main.innerHTML='';

  const wrap = document.createElement('div');
  const headerCard = el(`<div class="card">
    <div class="sec-title"><span class="sec-num">📚</span>Script Library</div>
    <div class="divider"></div>
    <p class="body-text">All saved illness scripts in one place. Click any card to view the full script. Use the Script Builder to add new scripts or edit existing ones.</p>
  </div>`);
  wrap.appendChild(headerCard);

  // Controls
  const controls = el(`<div class="card" style="padding:18px 22px"></div>`);
  const filterRow = el(`<div class="filter-row"></div>`);

  const searchInput = el(`<input class="search-input" placeholder="Search scripts..." id="lib-search"/>`);

  const allBtn = el(`<button class="filter-btn on" data-block="">All Blocks</button>`);
  filterRow.appendChild(searchInput);
  filterRow.appendChild(allBtn);
  BLOCKS.forEach(b=>{
    const btn = el(`<button class="filter-btn" data-block="${b}">${b}</button>`);
    btn.onclick=()=>{
      filterRow.querySelectorAll('.filter-btn[data-block]').forEach(x=>x.classList.remove('on'));
      btn.classList.add('on'); renderGrid();
    };
    filterRow.appendChild(btn);
  });
  allBtn.onclick=()=>{ filterRow.querySelectorAll('.filter-btn[data-block]').forEach(x=>x.classList.remove('on')); allBtn.classList.add('on'); renderGrid(); };

  const actionRow = el(`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px"></div>`);
  const countEl = el(`<span style="font-size:12.5px;color:var(--gray)" id="lib-count">${scripts.length} scripts</span>`);

  const btnsRight = el(`<div style="display:flex;gap:8px"></div>`);
  const newBtn = el(`<button class="btn btn-gold btn-sm">✎ New Script</button>`);
  newBtn.onclick=()=>navigate('script-builder');
  const exportBtn = el(`<button class="btn btn-outline btn-sm">⬇ Export All</button>`);
  exportBtn.onclick=()=>exportScripts();
  const importBtn = el(`<button class="btn btn-outline btn-sm">⬆ Import</button>`);
  importBtn.onclick=()=>importScripts();
  btnsRight.appendChild(newBtn); btnsRight.appendChild(exportBtn); btnsRight.appendChild(importBtn);
  actionRow.appendChild(countEl); actionRow.appendChild(btnsRight);

  controls.appendChild(filterRow); controls.appendChild(actionRow);
  wrap.appendChild(controls);

  const grid = el(`<div class="script-grid" id="lib-grid"></div>`);
  wrap.appendChild(grid);
  main.appendChild(wrap);

  function renderGrid() {
    const q = document.getElementById('lib-search')?.value.toLowerCase()||'';
    const activeBlock = [...filterRow.querySelectorAll('.filter-btn[data-block].on')].map(b=>b.dataset.block).find(b=>b)||'';
    const filtered = scripts.filter(s=>{
      const matchBlock = !activeBlock || s.block===activeBlock;
      const matchQ = !q || s.disease.toLowerCase().includes(q) || (s.presents||'').toLowerCase().includes(q);
      return matchBlock && matchQ;
    });
    document.getElementById('lib-count').textContent = `${filtered.length} of ${scripts.length} scripts`;
    grid.innerHTML='';
    if(filtered.length===0){
      grid.innerHTML=`<div style="grid-column:1/-1"><div class="empty-state">
        <div class="icon">📋</div>
        <h3>${scripts.length===0?'No scripts yet':'No scripts match'}</h3>
        <p>${scripts.length===0?'Use the Script Builder to create and save your first illness script. They will appear here.':'Try a different search or block filter.'}</p>
      </div></div>`;
      if(scripts.length===0){
        const b=el(`<button class="btn btn-gold">✎ Open Script Builder</button>`);
        b.onclick=()=>navigate('script-builder');
        grid.querySelector('.empty-state').appendChild(b);
      }
      return;
    }
    filtered.forEach(s=>{
      const card = el(`<div class="script-card"></div>`);
      const hdr = el(`<div class="script-card-header">
        <div class="script-card-title">${escHtml(s.disease)}</div>
        <span class="tag blue">${escHtml(s.block||'')}</span>
      </div>`);
      const body = el(`<div class="script-card-body"></div>`);
      if(s.who) body.appendChild(el(`<div class="script-card-field"><div class="script-card-fl">Who</div><div class="script-card-fv">${escHtml(s.who)}</div></div>`));
      if(s.presents) body.appendChild(el(`<div class="script-card-field"><div class="script-card-fl">Presents</div><div class="script-card-fv">${escHtml(s.presents.slice(0,100)+(s.presents.length>100?'…':''))}</div></div>`));
      if(s.treats) body.appendChild(el(`<div class="script-card-field"><div class="script-card-fl">Treatment</div><div class="script-card-fv">${escHtml(s.treats.slice(0,80)+(s.treats.length>80?'…':''))}</div></div>`));
      if(s.complications) body.appendChild(el(`<div class="script-card-field" style="border-left:3px solid var(--red);padding-left:6px"><div class="script-card-fl" style="color:var(--red)">🚨 Red Flags</div><div class="script-card-fv">${escHtml(s.complications.slice(0,90)+(s.complications.length>90?'…':''))}</div></div>`));
      // images
      if((s.images||[]).filter(i=>i.url||i.data).length>0){
        const imgRow = el(`<div class="img-row" style="margin-top:8px"></div>`);
        s.images.filter(i=>i.url||i.data).slice(0,4).forEach(img=>{
          const im = el(`<img src="${escHtml(img.data||img.url)}" class="img-thumb" alt="${escHtml(img.label||img.type||'')}" onerror="this.style.display='none'"/>`);
          im.onclick=(e)=>{ e.stopPropagation(); openLightbox(img.url,img.label||img.type||''); };
          imgRow.appendChild(im);
        });
        body.appendChild(imgRow);
      }
      // differentials preview
      if((s.differentials||[]).filter(d=>d.disease).length>0){
        const diffsEl = el(`<div style="margin-top:8px"><div class="script-card-fl">Differentials</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:3px"></div></div>`);
        s.differentials.filter(d=>d.disease).forEach(d=>{
          diffsEl.querySelector('div:last-child').appendChild(el(`<span class="tag gray">${escHtml(d.disease)}</span>`));
        });
        body.appendChild(diffsEl);
      }
      const footer = el(`<div class="script-card-footer"></div>`);
      const viewBtn = el(`<button class="btn btn-outline btn-xs">👁 View</button>`);
      viewBtn.onclick=(e)=>{ e.stopPropagation(); openViewModal(s); };
      const editBtn = el(`<button class="btn btn-ghost btn-xs">✎ Edit</button>`);
      editBtn.onclick=(e)=>{ e.stopPropagation(); editScript(s); };
      const copyBtn = el(`<button class="copy-btn" style="padding:4px 9px;font-size:11px">⧉ Copy</button>`);
      copyBtn.onclick=(e)=>{ e.stopPropagation(); copyScriptText(s,copyBtn); };
      const delBtn = el(`<button class="btn btn-red btn-xs" style="margin-left:auto">✕</button>`);
      delBtn.onclick=(e)=>{ e.stopPropagation(); deleteScript(s.id); renderGrid(); };
      footer.appendChild(viewBtn); footer.appendChild(editBtn); footer.appendChild(copyBtn); footer.appendChild(delBtn);
      card.appendChild(hdr); card.appendChild(body); card.appendChild(footer);
      card.onclick=()=>openViewModal(s);
      grid.appendChild(card);
    });
  }

  searchInput.oninput=()=>renderGrid();
  renderGrid();
}

// PDF EXPORT
// ══════════════════════════════════════════════════════════════

function exportChartPDF(activeBlock) {
  const filtered = scripts.filter(s=>!activeBlock||s.block===activeBlock);
  if(filtered.length===0){ alert('No scripts to export. Save some illness scripts first.'); return; }

  const { jsPDF } = window.jspdf;
  const blockLabel = activeBlock || 'All Blocks';
  const dateStr = new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});

  function pdf(str) {
    if(!str) return '-';
    return String(str)
      .replace(/\u2014|\u2013/g,'-').replace(/\u2019|\u2018/g,"'")
      .replace(/\u201C|\u201D/g,'"').replace(/\u2192/g,'->').replace(/\u2191/g,'^')
      .replace(/\u2193/g,'v').replace(/\u00B7|\u00B0/g,'-').replace(/\u2248/g,'~')
      .replace(/[\u0080-\uFFFF]/g,'');
  }

  // Convert image to base64 via canvas (works for uploaded data URIs and same-origin URLs)
  function imgToBase64(src) {
    return new Promise(function(resolve) {
      if(!src){ resolve(null); return; }
      // Already a data URI (uploaded file)
      if(src.startsWith('data:')){ resolve(src); return; }
      var img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = function() {
        try {
          var c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img,0,0);
          resolve(c.toDataURL('image/jpeg', 0.75));
        } catch(e){ resolve(null); }
      };
      img.onerror = function(){ resolve(null); };
      img.src = src;
    });
  }

  async function buildPDF() {
    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    doc.setFont('helvetica');

    function addFooters() {
      var total = doc.internal.getNumberOfPages();
      for(var i=1;i<=total;i++){
        doc.setPage(i);
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(160,160,160);
        doc.text('CHA/PA Learning System - Christopher Downy - ' + blockLabel + ' - ' + dateStr + '  |  Page ' + i + ' of ' + total, 6, doc.internal.pageSize.height-4);
      }
    }

    // Pre-load all first images
    var imgCache = {};
    await Promise.all(filtered.map(async function(s, si){
      var imgs = (s.images||[]).filter(function(im){ return im.data||im.url; });
      if(imgs.length>0){
        var src = imgs[0].data || imgs[0].url;
        var b64 = await imgToBase64(src);
        imgCache[si] = b64;
      }
    }));

    // ── HEADER ──
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(27,54,93);
    doc.text('CHA/PA Disease Chart', 6, 15);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(100,116,139);
    doc.text('Block: '+blockLabel+'  |  '+filtered.length+' script'+(filtered.length!==1?'s':'')+'  |  '+dateStr, 6, 22);
    doc.setDrawColor(180,193,210); doc.setLineWidth(0.4);
    doc.line(6,25,291,25);

    // Column widths: total = 269mm
    // Disease(28) Who(27) Path(28) Present(36) Workup(38) Treat(34) RedFlags(24) DDx(34) Image(20)
    var COL = {disease:28,who:27,path:28,present:38,workup:38,treat:34,flags:24,ddx:36,img:32};

    var head = [[
      {content:'Disease / Block',       styles:{cellWidth:COL.disease}},
      {content:'Who Gets It',           styles:{cellWidth:COL.who}},
      {content:'Pathophysiology',       styles:{cellWidth:COL.path}},
      {content:'Presentation',          styles:{cellWidth:COL.present}},
      {content:'Workup',                styles:{cellWidth:COL.workup}},
      {content:'Treatment',             styles:{cellWidth:COL.treat}},
      {content:'Red Flags',             styles:{cellWidth:COL.flags}},
      {content:'DDx',                   styles:{cellWidth:COL.ddx}},
      {content:'Img',                   styles:{cellWidth:COL.img}},
    ]];

    var body = filtered.map(function(s){
      var dx  = pdf(s.keyDiagnostics);
      var gs  = pdf(s.confirms);
      var workup = (dx!=='-'&&gs!=='-') ? dx+' | GS: '+gs : (dx!=='-'?dx:gs);
      var diffs = (s.differentials||[]).filter(function(d){return d.disease;})
        .map(function(d){ return 'vs '+pdf(d.disease)+(d.feature?': '+pdf(d.feature):''); }).join('\n') || '-';
      var diseaseCell = {content:pdf(s.disease)+'\n['+pdf(s.block)+']', styles:{fontStyle:'bold',textColor:[27,54,93],fillColor:[240,245,252]}};
      var flagsCell   = {content:pdf(s.complications), styles: s.complications ? {textColor:[160,20,20],fillColor:[255,242,242]} : {textColor:[150,150,150]}};
      return [diseaseCell, pdf(s.who), pdf(s.pathophysiology), pdf(s.presents), workup, pdf(s.treats), flagsCell, {content:diffs,styles:{fontSize:6}}, ''];
    });

    var tableEl;
    doc.autoTable({
      head: head, body: body, startY: 29,
      styles:{font:'helvetica',fontSize:6.5,cellPadding:2.8,valign:'top',overflow:'linebreak',lineColor:[220,220,220],lineWidth:0.2},
      headStyles:{fillColor:[27,54,93],textColor:255,fontStyle:'bold',fontSize:7,cellPadding:3.5,font:'helvetica'},
      alternateRowStyles:{fillColor:[248,250,252]},
      columnStyles:{
        0:{cellWidth:COL.disease},1:{cellWidth:COL.who},2:{cellWidth:COL.path},
        3:{cellWidth:COL.present},4:{cellWidth:COL.workup},5:{cellWidth:COL.treat},
        6:{cellWidth:COL.flags},7:{cellWidth:COL.ddx,fontSize:6},8:{cellWidth:COL.img},
      },
      margin:{left:6,right:6},
      rowPageBreak:'avoid', pageBreak:'auto',
      didDrawPage: function(data) {
        if(data.pageNumber>1){
          doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(27,54,93);
          doc.text('CHA/PA Disease Chart (cont.) - '+blockLabel, 6, 10);
          doc.setDrawColor(180,193,210); doc.setLineWidth(0.3); doc.line(6,12,291,12);
        }
      },
      didDrawCell: function(data) {
        // Draw images in the last column (col index 8) with correct aspect ratio
        if(data.section==='body' && data.column.index===8){
          var b64 = imgCache[data.row.index];
          if(b64){
            try {
              var cellX = data.cell.x+1, cellY = data.cell.y+1;
              var maxW = COL.img-2, maxH = data.cell.height-2;
              // Get natural dimensions from the cached image
              var imgInfo = doc.getImageProperties(b64);
              var nw = imgInfo.width, nh = imgInfo.height;
              // Scale to fit within maxW x maxH maintaining aspect ratio
              var scale = Math.min(maxW/nw, maxH/nh);
              var drawW = nw*scale, drawH = nh*scale;
              // Center within cell
              var offX = (maxW-drawW)/2, offY = (maxH-drawH)/2;
              doc.addImage(b64,'JPEG',cellX+offX,cellY+offY,drawW,drawH,'','FAST');
            } catch(e){}
          }
        }
      }
    });

    addFooters();
    doc.save('disease_chart_'+blockLabel.replace(/[^a-zA-Z0-9]/g,'_')+'_'+dateStr.replace(/[^a-zA-Z0-9]/g,'_')+'.pdf');
  }

  buildPDF().catch(function(e){ console.error('PDF error',e); alert('PDF generation failed: '+e.message); });
}

function renderChart() {
  const main = document.getElementById('main');
  main.innerHTML='';
  const wrap = document.createElement('div');

  const headerCard = el(`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">

      <button class="btn btn-gold" id="pdf-export-btn" style="white-space:nowrap;align-self:flex-start;margin-top:4px">⬇ Export PDF</button>
    </div>
  </div>`);
  wrap.appendChild(headerCard);
  headerCard.querySelector('#pdf-export-btn').onclick = () => exportChartPDF(getActiveBlockFilter());

  // Filter
  const filterCard = el(`<div class="card" style="padding:16px 20px"></div>`);
  const filterRow = el(`<div class="filter-row"></div>`);
  const allBtn = el(`<button class="filter-btn on" data-b="">All Blocks</button>`);
  filterRow.appendChild(allBtn);
  BLOCKS.forEach(b=>{
    const btn = el(`<button class="filter-btn" data-b="${b}">${b}</button>`);
    btn.onclick=()=>{ filterRow.querySelectorAll('.filter-btn[data-b]').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); renderTable(); };
    filterRow.appendChild(btn);
  });

  filterCard.appendChild(filterRow);
  wrap.appendChild(filterCard);

  function getActiveBlockFilter() {
    return [...filterRow.querySelectorAll('.filter-btn[data-b].on')].map(b=>b.dataset.b).find(b=>b)||'';
  }

  const tableCard = el(`<div class="card chart-table" style="padding:0;overflow:hidden"><div id="chart-table-wrap" class="tbl-wrap" style="margin:0;border-radius:0;border:none"></div></div>`);
  wrap.appendChild(tableCard);
  main.appendChild(wrap);

  function renderTable() {
    const activeBlock = getActiveBlockFilter();
    const filtered = scripts.filter(s=>!activeBlock||s.block===activeBlock);
    const tw = document.getElementById('chart-table-wrap');

    if(filtered.length===0){
      tw.innerHTML=`<div class="empty-state" style="padding:40px 24px">
        <div class="icon">📊</div>
        <h3>${scripts.length===0?'No scripts saved yet':'No scripts in this block'}</h3>
        <p>Save illness scripts in the Script Builder to populate this chart.</p>
      </div>`;
      if(scripts.length===0){
        const b=el(`<button class="btn btn-gold" style="margin:0 auto;display:flex">✎ Open Script Builder</button>`);
        b.onclick=()=>navigate('script-builder');
        tw.querySelector('.empty-state').appendChild(b);
      }
      return;
    }

    const cols = [
      {key:'block',label:'Block'},
      {key:'who',label:'Who Gets It'},
      {key:'pathophysiology',label:'Pathophysiology'},
      {key:'presents',label:'Presentation'},
      {key:'pertinentNegatives',label:'Pertinent Negatives'},
      {key:'keyDiagnostics',label:'Key Diagnostics'},
      {key:'confirms',label:'Gold Standard'},
      {key:'treats',label:'Treatment'},
      {key:'complications',label:'Red Flags / Complications'},
      {key:'diffs',label:'Key Differentials'},
      {key:'images',label:'Images'},
    ];

    const tbl = document.createElement('table');
    const thead = document.createElement('thead');
    const hRow = document.createElement('tr');
    const th0 = document.createElement('th');
    th0.style.cssText='min-width:140px;position:sticky;left:0;z-index:3';
    th0.textContent='Disease';
    hRow.appendChild(th0);
    cols.forEach(c=>{ const th=document.createElement('th'); th.textContent=c.label; hRow.appendChild(th); });
    thead.appendChild(hRow);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    filtered.forEach(s=>{
      const tr = document.createElement('tr');
      // Disease name cell (sticky)
      const nameTd = document.createElement('td');
      nameTd.className='disease-name';
      nameTd.textContent=s.disease;
      const viewBtn = document.createElement('button');
      viewBtn.className='btn btn-outline btn-xs';
      viewBtn.style.cssText='margin-top:4px;display:block';
      viewBtn.textContent='👁 View';
      viewBtn.onclick=()=>openViewModal(s);
      nameTd.appendChild(viewBtn);
      tr.appendChild(nameTd);
      // Other columns
      cols.forEach(c=>{
        const td = document.createElement('td');
        if(c.key==='diffs'){
          const diffs=(s.differentials||[]).filter(d=>d.disease);
          if(diffs.length>0){
            const ul=document.createElement('ul');
            ul.style.cssText='list-style:none;padding:0;margin:0';
            diffs.forEach(d=>{
              const li=document.createElement('li');
              li.style.cssText='padding:2px 0;font-size:11.5px;line-height:1.4;border-bottom:1px solid var(--border);margin-bottom:3px';
              li.innerHTML=`<strong style="color:var(--navy)">${escHtml(d.disease)}</strong><br/><span style="color:var(--gray)">${escHtml(d.feature)}</span>`;
              ul.appendChild(li);
            });
            td.appendChild(ul);
          } else { td.textContent='—'; }
        } else if(c.key==='images'){
          const imgs=(s.images||[]).filter(i=>i.url||i.data);
          if(imgs.length>0){
            const row=document.createElement('div');
            row.className='chart-img-cell';
            imgs.forEach(img=>{
              const im=document.createElement('img');
              im.src=img.data||img.url; im.title=img.label||img.type||'';
              im.onerror=()=>im.style.display='none';
              im.onclick=()=>openLightbox(img.url,`${s.disease} — ${img.label||img.type||''}`);
              row.appendChild(im);
            });
            td.appendChild(row);
          } else { td.textContent='—'; }
        } else {
          td.textContent = s[c.key]||'—';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    tw.innerHTML='';
    tw.appendChild(tbl);
  }
  renderTable();
}

function openLightbox(url, caption) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if(!e || e.target===document.getElementById('lightbox') || e.currentTarget===document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src='';
  }
}

function openViewModal(s) {
  document.getElementById('vm-title').textContent = s.disease;
  const body = document.getElementById('vm-body');

  const fields = [
    {label:'Block', val:s.block||''},
    {label:'Who Gets It', val:s.who||''},
    {label:'Pathophysiology', val:s.pathophysiology||''},
    {label:'How It Presents', val:s.presents||''},
    {label:'Pertinent Negatives', val:s.pertinentNegatives||''},
    {label:'Key Diagnostic Findings', val:s.keyDiagnostics||''},

    {label:'How You Treat It', val:s.treats||''},
    {label:'Red Flags / Complications', val:s.complications||'', highlight:'red'},

  fields.forEach(f=>{
    if(!f.val) return;
    const bg = f.highlight==='red' ? 'var(--red-lt)' : '#F8FAFC';

      <div style="font-size:13.5px;color:#374151;line-height:1.7;background:${bg};border-radius:7px;padding:10px 12px;border:${border}">${escHtml(f.val)}</div>

        <strong style="color:var(--navy)">vs. ${escHtml(d.disease)}</strong><br/>

    imgs.forEach(img=>{
      const imgCard=el(`<div style="border-radius:9px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="openLightbox('${escAttr(img.url)}','${escAttr(img.label||img.type||'')}')">
        <img src="${escHtml(img.data||img.url)}" style="width:100%;height:130px;object-fit:cover;display:block" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'160\\' height=\\'130\\'><rect fill=\\'%23f0f4f8\\' width=\\'160\\' height=\\'130\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' fill=\\'%236B7280\\' font-size=\\'11\\'>Image not found</text></svg>'"/>
        <div style="padding:6px 9px;background:#F8FAFC;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11.5px;font-weight:600;color:var(--navy)">${escHtml(img.label||'Image')}</span>
          <span class="img-type-badge img-type-${img.type||'clinical'}">${img.type||'clinical'}</span>
        </div>
      </div>`);
      imgWrap.querySelector('div:last-child').appendChild(imgCard);
    });

  // Buttons

  const copyB = el(`<button class="copy-btn" style="padding:7px 14px;font-size:12.5px">⧉ Copy Text</button>`);
  copyB.onclick=()=>copyScriptText(s,copyB);
  const closeB = el(`<button class="btn btn-outline" style="margin-left:auto">Close</button>`);
  closeB.onclick=closeViewModal;
  btnRow.appendChild(editB); btnRow.appendChild(copyB); btnRow.appendChild(closeB);
  body.appendChild(btnRow);
  document.getElementById('view-modal').classList.add('open');

// ══════════════════════════════════════════════════════════════
// SCRIPT ACTIONS
// ══════════════════════════════════════════════════════════════

function editScript(s) {
  scriptDraft = {...s, _id:s.id};
  saveDraft();
  navigate('script-builder');
}

function deleteScript(id) {
  if(confirm('Delete this illness script?')){
    scripts = scripts.filter(s=>s.id!==id);
    saveScripts(); updateNavFooter();
  }
}

function copyScriptText(s,btn) {
  const txt = buildScriptText(s);
  if(navigator.clipboard){navigator.clipboard.writeText(txt).catch(()=>{});}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  const orig=btn.textContent; btn.textContent='✓ Copied!'; btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); },2000);
}

function exportScripts() {
  const data = JSON.stringify(scripts,null,2);
  const blob = new Blob([data],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='pa_illness_scripts.json'; a.click();
  URL.revokeObjectURL(url);
}

function importScripts() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(Array.isArray(data)){
          const merged=[...scripts];
          data.forEach(s=>{
            if(!merged.find(x=>x.id===s.id)) merged.push(s);
          });
          scripts=merged; saveScripts(); updateNavFooter();
          alert(`Imported. Total scripts: ${scripts.length}`);
          renderLibrary();
        }
      } catch(err){ alert('Import failed — invalid file format.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// UTILITY
// ══════════════════════════════════════════════════════════════

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════════════
// CHECKLIST
// ══════════════════════════════════════════════════════════════

function renderCheckSection(items,container){
  const done=items.filter(i=>checks[i.id]).length;
  const pct=Math.round(done/items.length*100);
  const wrap=el(`<div></div>`);
  const prog=el(`<div style="display:flex;justify-content:space-between;margin-bottom:4px">
    <span style="font-size:11.5px;color:var(--gray)">${done}/${items.length} complete</span>
    <span style="font-size:12px;font-weight:700;color:${pct===100?'var(--green)':'var(--gold)'}">${pct}%</span>
  </div>`);
  const pb=el(`<div class="pbar"></div>`);
  pb.innerHTML=`<div class="pfill" style="width:${pct}%"></div>`;
  wrap.appendChild(prog); wrap.appendChild(pb);
  const list=el(`<div style="margin-top:9px"></div>`);
  items.forEach(item=>{
    const row=el(`<div class="chk-item${checks[item.id]?' done':''}"></div>`);
    const box=el(`<div class="chk-box${checks[item.id]?' on':''}">${checks[item.id]?'<span style="color:#fff;font-size:11px;font-weight:700">✓</span>':''}</div>`);
    const txt=el(`<div class="chk-text">${escHtml(item.text)}</div>`);
    row.appendChild(box); row.appendChild(txt);
    row.onclick=()=>{
      checks[item.id]=!checks[item.id]; saveChecks(); updateNavFooter();
      // re-render this section
      container.innerHTML='';
      renderCheckSection(items,container);
    };
    list.appendChild(row);
  });
  wrap.appendChild(list);
  container.appendChild(wrap);
}

function renderMain() {
  const main = document.getElementById('main');
  if(activeSection==='script-builder'){ renderScriptBuilder(); return; }
  if(activeSection==='library'){ renderLibrary(); return; }
  if(activeSection==='chart'){ renderChart(); return; }
  if(activeSection==='brain-dump'){ renderBrainDump(); return; }
  if(activeSection==='settings'){ renderSettings(); return; }
  if(activeSection==='vignette'){ renderVignette(); return; }
  if(activeSection==='anki-builder'){ renderAnkiBuilder(); return; }
  main.innerHTML='';
  const content = buildSection(activeSection);
  if(content) main.appendChild(content);
}
